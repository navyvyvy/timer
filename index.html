<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080604">
<meta name="google-adsense-account" content="ca-pub-6996920182245498">

     crossorigin="anonymous"></script>
<title>Step Timer</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080604;
  --surface: #17110c;
  --surface2: #24180f;
  --surface3: #302116;
  --border: #493323;
  --border-strong: #725033;
  --text: #fff4e2;
  --text-dim: #b99f7c;
  --text-mid: #dec6a8;
  --accent: #ffb24a;
  --accent-strong: #ffd07a;
  --accent-dim: #7a4518;
  --accent-bg: #2b190a;
  --ink-on-accent: #1a0d02;
  --warn: #ff5a52;
  --warn-dim: #7a211d;
  --warn-bg: #2b0f0d;
  --green: #58c878;
  --green-bright: #7eff9d;
  --green-bg: #102716;
  --done-bg: #2b190a;
  --done-border: #ffb24a;
  --done-text: #ffd38a;
  --done-shadow: rgba(255,178,74,0.14);
  --dev: #b894ff;
  --dev-dim: #3d2f58;
  --focus: #ffd38a;
  --radius: 16px;
}
body[data-profile="mandu"] {
  --accent: #7ee08f;
  --accent-strong: #b5ffbf;
  --accent-dim: #275f34;
  --accent-bg: #102617;
  --ink-on-accent: #061207;
  --focus: #b5ffbf;
  --done-bg: #102716;
  --done-border: #7ee08f;
  --done-text: #b5ffbf;
  --done-shadow: rgba(126,224,143,0.14);
}
body[data-profile="ramen"] {
  --accent: #ff6f47;
  --accent-strong: #ffd1b5;
  --accent-dim: #8d3827;
  --accent-bg: #2a120d;
  --ink-on-accent: #1c0804;
  --focus: #ffd1b5;
  --done-bg: #2a120d;
  --done-border: #ff6f47;
  --done-text: #ffd1b5;
  --done-shadow: rgba(255,111,71,0.18);
}
body[data-profile="egg"] {
  --accent: #ffc84d;
  --accent-strong: #fff0b0;
  --accent-dim: #7a5d1b;
  --accent-bg: #2d2206;
  --ink-on-accent: #1b1404;
  --focus: #fff0b0;
  --done-bg: #2d2206;
  --done-border: #ffc84d;
  --done-text: #fff0b0;
  --done-shadow: rgba(255,200,77,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
button, input, select { font: inherit; }
[hidden] { display: none !important; }
button:focus-visible,
input:focus-visible,
select:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
}

html {
  /* 100dvh 기준 — iOS Safari 주소창 높이 변동 대응 */
  height: 100dvh;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  overflow-x: hidden;
}

/* ── Flash overlay ── */
#flash-overlay {
  position: fixed; inset: 0; z-index: 900;
  pointer-events: none; background: var(--warn); opacity: 0;
}
#flash-overlay.flashing { animation: flash-pulse 0.85s ease-in-out infinite; }
@keyframes flash-pulse { 0%,100%{opacity:0} 50%{opacity:0.28} }

/* ── Confirm overlay (초기화 이중확인) ── */
#confirm-overlay {
  position: fixed; inset: 0; z-index: 1100;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.78); backdrop-filter: blur(8px); padding: 24px;
}
#confirm-overlay.active { display: flex; }
#confirm-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 22px;
  width: 100%; max-width: 320px; padding: 28px 22px 20px; text-align: center;
  animation: modal-in 0.18s ease-out;
}
#confirm-box h3 {
  font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700;
  color: var(--text); margin-bottom: 8px;
}
#confirm-box p { font-size: 14px; color: var(--text-mid); margin-bottom: 22px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-cancel {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text-mid); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  padding: 14px; cursor: pointer; transition: background 0.1s;
}
.confirm-cancel:active { background: var(--border); }
.confirm-ok {
  flex: 1; background: var(--warn-dim); border: 1px solid var(--warn); border-radius: 12px;
  color: var(--warn); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  padding: 14px; cursor: pointer; transition: background 0.1s;
}
.confirm-ok:active { background: var(--warn); color: white; }

/* ── Alert Modal ── */
#alert-modal {
  position: fixed; inset: 0; z-index: 1000;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.82); backdrop-filter: blur(10px); padding: 24px;
}
#alert-modal.active { display: flex; }
#alert-content {
  background: var(--warn-bg); border: 1.5px solid var(--warn); border-radius: 28px;
  width: 100%; max-width: 360px; padding: 40px 28px 28px;
  text-align: center;
  box-shadow: 0 0 80px rgba(255,90,82,0.28);
  animation: modal-in 0.2s ease-out;
}
@keyframes modal-in { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
#alert-emoji { font-size: 56px; margin-bottom: 14px; display: block; }
#alert-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 34px;
  letter-spacing: 1.5px; color: var(--warn); margin-bottom: 10px;
}
#alert-msg { color: var(--text-mid); font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
#alert-dismiss {
  background: var(--warn); color: white; border: none; border-radius: 16px;
  width: 100%; padding: 20px;
  font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
  box-shadow: 0 4px 20px rgba(255,90,82,0.32);
  transition: transform 0.1s, opacity 0.1s;
}
#alert-dismiss:active { transform: scale(0.97); opacity: 0.9; }

/* ── Extension Modal ── */
#ext-modal {
  position: fixed; inset: 0; z-index: 1000;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 24px;
}
#ext-modal.active { display: flex; }
#ext-content {
  background: var(--done-bg); border: 1.5px solid var(--done-border); border-radius: 28px;
  width: 100%; max-width: 360px; padding: 36px 24px 24px;
  text-align: center; box-shadow: 0 0 60px var(--done-shadow);
  animation: modal-in 0.2s ease-out;
}
#ext-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; color:var(--done-text); margin-bottom:6px; }
#ext-sub { color:var(--text-mid); font-size:15px; margin-bottom:24px; }
.ext-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.ext-btn {
  background:var(--surface2); border:1px solid var(--border); border-radius:14px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700;
  padding:18px 12px; cursor:pointer; transition:background 0.15s;
}
.ext-btn:active { background:var(--surface); }
.ext-btn.highlight { background:var(--done-bg); border-color:var(--done-border); color:var(--done-text); }
.ext-btn.highlight:active { background: var(--done-bg); }
#ext-finish {
  background:transparent; border:1px solid var(--done-border); border-radius:12px;
  color:var(--done-text); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
  padding:14px; width:100%; cursor:pointer; transition:color 0.15s;
}
#ext-finish:active { color:var(--text); background: var(--done-bg); }

/* ════════════════════════════════
   CENTERED FULL-HEIGHT LAYOUT
════════════════════════════════ */
body {
  display: flex; align-items: flex-start; justify-content: center;
  min-height: 100dvh;
  padding: 12px 0;
}
body.timer-active { align-items: center; }
#page-shell {
  width: 100%; max-width: 430px;
  display: flex; flex-direction: column; align-items: center;
  gap: 10px;
}
#app {
  width: 100%; max-width: 390px;
  display: flex; flex-direction: column;
  padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
  gap: 7px;
}

/* ── APP HEADER / MODE SWITCH ── */
#app-header {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
}
.app-title-row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  margin-bottom: 10px;
}
#app-title {
  font-size: 17px; font-weight: 800; letter-spacing: 0;
  color: var(--text); line-height: 1.15;
}
#app-subtitle {
  color: var(--text-mid); font-size: 12px; font-weight: 600;
  line-height: 1.4; margin-top: 2px;
}
.profile-chip {
  color: var(--accent-strong); background: var(--accent-bg);
  border: 1px solid var(--accent-dim); border-radius: 8px;
  min-height: 28px; padding: 5px 8px;
  font-family: 'DM Mono', monospace; font-size: 11px; white-space: nowrap;
}
.mode-tabs {
  display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 5px;
}
.mode-tab {
  min-height: 40px; border: 1px solid var(--border); border-radius: 9px;
  background: var(--surface2); color: var(--text-mid);
  font-size: 13px; font-weight: 800; cursor: pointer;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
}
.mode-tab[aria-selected="true"] {
  color: var(--ink-on-accent); background: var(--accent); border-color: var(--accent);
}
.mode-tab:disabled {
  cursor: not-allowed; opacity: 0.55;
}

/* ── SITE FOOTER ── */
.site-footer {
  width: calc(100% - 28px); max-width: 390px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  color: var(--text-dim); font-size: 12px; padding: 4px 0 10px;
}
.site-footer a {
  color: var(--text-mid); text-decoration: none;
}
.site-footer a:focus-visible {
  outline: 2px solid var(--focus); outline-offset: 3px; border-radius: 4px;
}
body.timer-active .site-footer {
  display: none;
}

/* ── TOP SECTION — Preheat ── */
#top-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 12px 10px;
}

.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-dim);
  display: block; margin-bottom: 8px;
}

/*
  Preheat 6-col grid:
  [timer × 3] [온도] [시작] [초기화]
  adj-grid-6 uses same 6 cols + same gap → pixel-perfect vertical alignment
*/
.ph-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  align-items: center;
  margin-bottom: 5px;
}
/* countdown timer spans 3 cols */
.ph-time-big {
  grid-column: span 3;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px; letter-spacing: 1px; line-height: 1;
  color: var(--text);
}
.ph-time-big.running { color: var(--accent-strong); }
.ph-time-big.done    { color: var(--done-text); }

/* shared chip style for target time + temp */
.info-chip {
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text-mid);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 0 4px;
  display: flex; align-items: center; justify-content: center; gap: 2px;
  transition: color 0.3s, border-color 0.3s;
  min-height: 40px; /* same as ph-ctrl-btn */
  white-space: nowrap; overflow: hidden;
}
.info-chip.near    { color: var(--accent-strong); border-color: var(--accent); }
.info-chip.reached { color: var(--done-text); border-color: var(--done-border); }
.info-chip input {
  background: transparent; border: none; outline: none;
  color: inherit; font-family: inherit; font-size: inherit;
  width: 28px; text-align: center;
  -moz-appearance: textfield;
}
.temp-unit { color: var(--text-dim); font-size: 12px; }
.info-chip input::-webkit-inner-spin-button,
.info-chip input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── PRODUCT PRESET ── */
#preset-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.preset-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.preset-head-actions {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end;
}
.preset-reset {
  min-height: 34px; border: 1px solid var(--border); border-radius: 9px;
  background: var(--surface2); color: var(--text-mid);
  font-size: 12px; font-weight: 800; padding: 0 10px; cursor: pointer;
  white-space: nowrap;
}
.preset-reset:active { background: var(--border); color: var(--text); }
.preset-filter-row {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.preset-filter-row.tools {
  align-items: center; justify-content: space-between;
}
.preset-sort-group {
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
}
.preset-state-group {
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
}
.preset-tools-right {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  justify-content: flex-end;
}
.preset-chip {
  min-height: 20px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface2); color: var(--text-mid);
  font-size: 8.5px; font-weight: 700; padding: 0 5px; cursor: pointer;
  white-space: nowrap;
  line-height: 1;
}
.preset-chip.active {
  color: var(--ink-on-accent); background: var(--accent); border-color: var(--accent);
}
.preset-chip.fav-on {
  color: var(--accent-strong); background: var(--accent-bg); border-color: var(--accent-dim);
}
.preset-detail {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 9px;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 0;
}
.preset-detail-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
#preset-name {
  color: var(--text); font-size: 14px; font-weight: 900; line-height: 1.12;
}
.preset-detail-actions {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end;
}
.preset-detail-meta {
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
}
.preset-fav-btn {
  min-width: 24px; height: 24px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--surface2); color: var(--text-dim);
  font-size: 13px; font-weight: 800; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1;
}
.preset-fav-btn.on {
  color: var(--accent-strong); background: var(--accent-bg); border-color: var(--accent-dim);
}
.preset-recipe-label {
  color: var(--text-dim); font-size: 10px; font-weight: 800;
  letter-spacing: 0.3px; margin-top: 2px;
}
#preset-guide {
  min-height: 56px; max-height: 72px; overflow: hidden;
  color: var(--text); font-size: 12px; font-weight: 600;
  line-height: 1.45;
}
.preset-detail-badge {
  min-height: 22px; padding: 0 7px;
  display: inline-flex; align-items: center; gap: 4px;
  border: 1px solid var(--border); border-radius: 8px; background: var(--surface2);
  color: var(--text-mid); font-size: 10px; font-weight: 800; line-height: 1;
  white-space: nowrap;
}
.preset-detail-badge strong {
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 800;
}
.preset-source-link {
  flex-shrink: 0; min-height: 24px; padding: 0 8px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: 8px; background: var(--surface2);
  color: var(--accent-strong); text-decoration: none; font-size: 10px; font-weight: 800;
  white-space: nowrap;
  line-height: 1;
}
.preset-apply {
  min-height: 38px; border: 1px solid var(--accent-dim);
  border-radius: 9px; background: var(--accent-bg);
  color: var(--accent-strong); font-size: 12px; font-weight: 800;
  padding: 0 10px; cursor: pointer; white-space: nowrap;
}
.preset-apply:active { background: var(--surface3); }
.preset-apply-row {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px;
}
.preset-list-shell {
  height: 168px; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none; -ms-overflow-style: none; scrollbar-gutter: auto;
  display: flex; flex-direction: column; gap: 6px;
}
.preset-list-shell::-webkit-scrollbar {
  width: 0; height: 0;
}
.preset-list {
  display: flex; flex-direction: column; gap: 3px;
}
.preset-empty {
  border: 1px dashed var(--border); border-radius: 10px; padding: 18px 12px;
  color: var(--text-dim); font-size: 12px; line-height: 1.5; text-align: center;
}
.preset-empty button {
  margin-top: 10px;
}
.preset-card {
  width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 7px 9px; cursor: pointer; text-align: left;
}
.preset-card.selected {
  border-color: var(--accent); background: var(--accent-bg);
}
.preset-card-label {
  color: var(--text); font-size: 12px; font-weight: 500; line-height: 1.1;
  min-width: 0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.preset-card-fav {
  flex-shrink: 0; width: 26px; height: 26px; border: none; border-radius: 8px;
  background: transparent; color: var(--text-dim); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1;
}
.preset-card-fav.on {
  color: var(--accent-strong);
}
body[data-profile="egg"] #preset-section {
  gap: 8px;
}
body[data-profile="egg"] .preset-head {
  align-items: center;
}
body[data-profile="egg"] .preset-head-actions {
  gap: 6px;
}
body[data-profile="egg"] .preset-list-shell {
  height: auto;
  overflow: visible;
}
body[data-profile="egg"] .preset-list {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 4px;
}
body[data-profile="egg"] .preset-card {
  justify-content: center;
  min-height: 36px;
  padding: 6px 8px;
}
body[data-profile="egg"] .preset-card-label {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
}
body[data-profile="egg"] .preset-detail {
  padding: 8px;
  gap: 4px;
}
body[data-profile="roast"] .preset-detail {
  gap: 5px;
}
body[data-profile="egg"] #preset-name {
  font-size: 13px;
}
body[data-profile="roast"] #preset-guide {
  min-height: 70px;
  max-height: 96px;
}
body[data-profile="egg"] .preset-detail-meta {
  gap: 3px;
}
body[data-profile="egg"] .preset-detail-badge {
  min-height: 20px;
  padding: 0 6px;
  font-size: 9px;
}
body[data-profile="egg"] .preset-detail-badge strong {
  font-size: 9px;
}
body[data-profile="egg"] .preset-recipe-label {
  margin-top: 0;
}
body[data-profile="egg"] #preset-guide {
  min-height: 40px;
  max-height: 50px;
  font-size: 11px;
  line-height: 1.4;
}

/* start / reset — same height as chips */
.ph-ctrl-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text-mid); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  min-height: 40px;
  cursor: pointer; text-align: center;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  padding: 0;
}
.ph-ctrl-btn:active { background: var(--border); }
.ph-ctrl-btn.start.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-strong); }
.ph-ctrl-btn.reset { color: var(--text-dim); }

/* progress bar full width across all 6 cols */
.ph-progress-row {
  margin-bottom: 4px;
}
.ph-progress-wrap { height: 2px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.ph-progress-bar  { height: 100%; width: 100%; background: var(--accent); border-radius: 99px; transform-origin: left center; transform: scaleX(0); transition: transform 0.4s linear; }
.ph-progress-bar.reached { background: var(--green-bright); }

/* Adj buttons — same 6-col grid, same gap=4px → perfect alignment */
.adj-grid-6 { display: grid; grid-template-columns: repeat(6,1fr); gap: 4px; }
.adj-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  min-height: 34px;
  padding: 6px 2px; cursor: pointer; text-align: center; line-height: 1.3;
  transition: background 0.1s;
}
.adj-btn:active:not(:disabled) { background: var(--border); }
.adj-btn.minus { color: var(--text-dim); }
.adj-btn.plus  { color: var(--accent-strong); }
.adj-btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

/* ── MASTER TIMER ── */
#master-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 16px 16px;
  text-align: center;
}
.master-ring-wrap {
  position: relative; margin: 0 auto 14px;
  width: min(210px, 54vw); height: min(210px, 54vw);
}
#master-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }
#ring-progress {
  fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round;
  transition: stroke-dashoffset 0.45s linear;
}
#ring-progress.danger { stroke: var(--warn); }
.master-time-inner {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); text-align: center;
  width: 100%;
}
/* master label: keep the center readout to one numeric timer */
#master-countdown {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; line-height: 1;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
#master-countdown.active { color: var(--accent-strong); }
#master-countdown.danger { color: var(--warn); }

/* 구분선 */
.ring-divider {
  display: none;
  width: 28px; height: 1px;
  background: var(--border);
  margin: 4px auto;
}

/* single central timer */
#master-time {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 12vw, 56px);
  letter-spacing: 2px; line-height: 1; color: var(--text);
}
#master-time.active { color: var(--accent-strong); }
#master-time.danger { color: var(--warn); }
#master-time.done { color: var(--done-text); }
#master-status {
  font-size: 12px; letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--text-dim); margin-top: 5px; text-align: center;
}
#master-status.active-ms { color: var(--accent-strong); }
#master-status.danger-ms { color: var(--warn); }
#master-status.done-ms   { color: var(--done-text); }
#master-reference {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 30px; margin: -4px auto 14px; padding: 6px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-mid); font-family: 'DM Mono', monospace;
  font-size: 12px; line-height: 1.2; letter-spacing: 0.2px;
}
#master-reference.extended {
  color: var(--done-text);
  border-color: var(--done-border);
  background: var(--done-bg);
}

.master-btn-row { display: flex; gap: 8px; }
.start-btn {
  flex: 1; background: var(--accent); color: var(--ink-on-accent); border: none; border-radius: 13px;
  padding: 14px; font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.2px;
  transition: opacity 0.15s, transform 0.1s;
}
.start-btn:active { transform: scale(0.98); opacity: 0.88; }
.start-btn.running {
  background: var(--warn-bg);
  color: var(--warn);
  border: 1.5px solid var(--warn-dim);
  box-shadow: 0 0 16px rgba(255,90,82,0.14);
}
/* ✅ SUCCESS TONE */
.start-btn.done {
  background: var(--done-bg);
  border: 1.5px solid var(--done-border);
  color: var(--done-text);
  box-shadow: 0 0 20px var(--done-shadow);
}
.start-btn.restart {
  background: var(--done-bg);
  border: 1.5px solid var(--done-border);
  color: var(--done-text);
  box-shadow: 0 0 20px var(--done-shadow);
}
.reset-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 13px;
  color: var(--text-dim); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700; padding: 14px 16px; cursor: pointer;
  transition: background 0.1s, color 0.1s; white-space: nowrap;
}
.reset-btn:active { background: var(--border); color: var(--text); }

/* ── MILESTONES ── */
#milestones-section { display: flex; flex-direction: column; gap: 6px; }
.milestone-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px; transition: border-color 0.3s;
}
.milestone-card.reached   { border-color: var(--done-border); }
.milestone-card.active-ms { border-color: var(--accent); background: var(--accent-bg); }
.ms-header { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.ms-icon   { font-size: 16px; flex-shrink: 0; }
.ms-info   { flex: 1; min-width: 0; }
.ms-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1px; }
.ms-name   { font-size: 12px; font-weight: 700; color: var(--text-mid); cursor: text; }
.ms-name:not(.readonly):hover { color: var(--text); }
.ms-name-input {
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  outline: none; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700; width: 100%; max-width: 120px; padding: 0 2px;
}
.reached-badge {
  display: none; background: var(--done-text); color: var(--ink-on-accent);
  font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
  padding: 2px 6px; border-radius: 5px; flex-shrink: 0;
}
.milestone-card.reached .reached-badge { display: inline-block; }
.ms-time-display {
  display: none;
  font-family: 'DM Mono', monospace; font-size: 20px; color: var(--accent); letter-spacing: 1px;
  transition: color 0.3s;
}
.ms-time-display.urgent { color: var(--warn); }
.milestone-card.reached .ms-time-display { color: var(--done-text); }
.ms-target-label {
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text-mid);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 7px;
  flex-shrink: 0; text-align: center; min-width: 54px;
}
.ms-progress-wrap { height: 2px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
.ms-progress-bar  { height: 100%; width: 100%; background: var(--accent); border-radius: 99px; transform-origin: left center; transform: scaleX(0); transition: transform 0.4s linear; }
.milestone-card.reached .ms-progress-bar { background: var(--done-border); }

/* 삭제 버튼 */
.ms-delete-btn {
  background: transparent; border: none;
  color: var(--text-dim); font-size: 15px; line-height: 1;
  cursor: pointer; padding: 2px 5px; border-radius: 5px; flex-shrink: 0;
  transition: color 0.15s, background 0.1s; margin-left: 2px;
}
.ms-delete-btn:active { color: var(--warn); }

/* 타이머 추가 버튼 */
#add-milestone-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: var(--radius); color: var(--text-mid);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  min-height: 42px;
  padding: 10px; cursor: pointer; width: 100%;
  transition: border-color 0.15s, color 0.15s, background 0.1s;
}
#add-milestone-btn:active { border-color: var(--accent); color: var(--accent-strong); }

/* ── BOTTOM ── */
#bottom-bar { display: flex; gap: 8px; align-items: center; }
#wakelock-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  min-height: 36px; font-size: 11px; font-weight: 700; color: var(--text-mid); flex: 1;
}
#wakelock-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border-strong); flex-shrink: 0; }
#wakelock-dot.on { background: var(--green-bright); }
#dev-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text-mid); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  min-height: 36px; padding: 6px 14px; cursor: pointer; white-space: nowrap;
  transition: background 0.15s, color 0.15s, border-color 0.15s; letter-spacing: 0.5px;
}
#dev-btn.on { background: var(--dev-dim); border-color: var(--dev); color: var(--dev); }

#dev-panel {
  display: none; background: var(--surface); border: 1px solid var(--dev);
  border-radius: var(--radius); padding: 12px;
}
#dev-panel.open { display: block; }
.dev-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--dev); margin-bottom: 8px; }
.dev-grid  { display: flex; flex-direction: column; gap: 5px; }
.dev-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 11px;
}
.dev-row-label { font-size: 13px; font-weight: 700; color: var(--text-mid); flex: 1; }
.dev-trigger {
  background: var(--dev-dim); border: 1px solid var(--dev); border-radius: 7px;
  color: var(--dev); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  min-height: 34px; padding: 5px 11px; cursor: pointer; transition: background 0.1s;
}
.dev-trigger:active { background: var(--dev); color: white; }

#app.roast-active {
  gap: 10px;
}
#app.roast-active #app-header,
#app.roast-active #top-section,
#app.roast-active #preset-section,
#app.roast-active #add-milestone-btn,
#app.roast-active #dev-btn,
#app.roast-active #dev-panel,
#app.roast-active .milestone-card:not(.active-ms),
#app.roast-active .milestone-card .ms-target-label,
#app.roast-active .milestone-card .ms-delete-btn,
#app.roast-active .milestone-card .reached-badge {
  display: none;
}
#app.roast-active #bottom-bar {
  margin-top: 2px;
}
#app.roast-active .milestone-card.active-ms {
  border-color: var(--accent);
  background: var(--accent-bg);
  padding: 16px 14px;
}
#app.roast-active .milestone-card.active-ms .ms-header {
  align-items: center;
  margin-bottom: 10px;
}
#app.roast-active .milestone-card.active-ms .ms-name-row {
  align-items: flex-start;
  flex-direction: column;
  justify-content: flex-start;
}
#app.roast-active .milestone-card.active-ms .ms-icon {
  font-size: 24px;
}
.next-action-label {
  display: none;
}
#app.roast-active .next-action-label {
  display: block;
  color: var(--accent-strong);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 4px;
  order: -1;
}
#app.roast-active .milestone-card.active-ms .ms-name {
  color: var(--text);
  cursor: default;
  font-size: 16px;
}
#app.roast-active .milestone-card.active-ms .ms-target-label {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-strong);
  border-color: var(--accent);
  background: var(--surface3);
  font-size: 13px;
  min-height: 34px;
}
#app.roast-active .milestone-card.active-ms .ms-time-display {
  display: none;
}
#app.roast-active .milestone-card.active-ms .ms-progress-wrap {
  height: 6px;
  margin-bottom: 10px;
}
#app.roast-active .milestone-card.active-ms .adj-grid-6 {
  display: grid;
}
#app.roast-active .milestone-card.active-ms .adj-btn {
  background: var(--surface3);
  border-color: var(--accent-dim);
  font-size: 11px;
}
@media (pointer: coarse) {
  .info-chip,
  .ph-ctrl-btn,
  .preset-chip,
  .preset-reset,
  .preset-apply,
  .preset-fav-btn,
  .preset-card-fav,
  .adj-btn,
  #add-milestone-btn,
  .dev-trigger {
    min-height: 44px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  #flash-overlay.flashing {
    animation: none !important;
    opacity: 0.22;
  }
}
</style>
</head>

<script>
// ─── 상수 ────────────────────────────────────────────────────────────────────
const ALARM_INTERVAL_MS  = 1800;
const RING_DANGER_THRESH = 0.88;
const PROFILE_STORAGE_KEY = 'step-timer:active-profile:v1';
const RECIPE_STORAGE_PREFIX = 'step-timer:recipe:';
const LEGACY_RECIPE_STORAGE_KEY = 'roast-timer:recipe:v1';
const RAMEN_PRESET_STORAGE_KEY = 'step-timer:ramen-preset:v1';
const DEFAULT_TARGET_TEMP = 220;

const RAMEN_PRESETS = [
  {
    id: 'nongshim-shin',
    maker: '농심',
    name: '신라면',
    type: '국물',
    water: '550ml',

const MANDU_POPULARITY = Object.fromEntries(
  MANDU_PRESETS.map((preset, idx) => [preset.id, MANDU_PRESETS.length - idx])
);
const MANDU_FILTER_STORAGE_KEY = 'step-timer:mandu-filter:v1';
const MANDU_FAVORITES_STORAGE_KEY = 'step-timer:mandu-favorites:v1';
const MANDU_STATE_STORAGE_KEY = 'step-timer:mandu-state:v1';

function manduPresetById(id) {
  return MANDU_PRESETS.find(preset => preset.id === id) || MANDU_PRESETS[0];
}
function loadSelectedManduPresetId() {
  try {
    const saved = localStorage.getItem(MANDU_STATE_STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && parsed.selectedPresetId && manduPresetById(parsed.selectedPresetId).id === parsed.selectedPresetId) {
        return parsed.selectedPresetId;
      }
    }
  } catch(e) {}
  return MANDU_PRESETS[0].id;
}
function loadSelectedManduFrozen() {
  try {
    const saved = localStorage.getItem(MANDU_STATE_STORAGE_KEY);
    if (!saved) return true;
    const parsed = JSON.parse(saved);
    if (typeof parsed?.frozen === 'boolean') return parsed.frozen;
  } catch(e) {}
  return true;
}
function saveSelectedManduState() {
  try {
    localStorage.setItem(MANDU_STATE_STORAGE_KEY, JSON.stringify({
      selectedPresetId: selectedManduPresetId,
      frozen: selectedManduFrozen,
    }));
  } catch(e) {}
}
function setSelectedManduPreset(id) {
  const preset = manduPresetById(id);
  selectedManduPresetId = preset.id;
  saveSelectedManduState();
  return preset;
}
function manduSteamSec(preset, frozen = selectedManduFrozen) {
  return frozen ? preset.steamFrozenSec : preset.steamThawedSec;
}
function manduGuideText(preset, frozen = selectedManduFrozen) {
  return frozen ? preset.guideFrozen : preset.guideThawed;
}
function manduStepsFor(preset, frozen = selectedManduFrozen) {
  const steps = preset.stepsByState?.[frozen ? 'frozen' : 'thawed'];
  if (Array.isArray(steps) && steps.length) return steps;
  const sec = manduSteamSec(preset, frozen);
  return [{
    name: '찜기 조리',
    icon: '🥟',
    durationSec: sec,
    emoji: '🥟',
    alertMsg: `${preset.name} ${frozen ? '냉동' : '해동'} 기준 조리 시간이 되었습니다.`,
    actionLabel: '완료 확인',
  }];
}
function manduMilestones(id = selectedManduPresetId) {
  return manduStepsFor(manduPresetById(id)).map(step => ({ ...step }));
}
function manduKind(preset) {
  return preset.kind || '기타';
}
function manduSortScore(preset) {
  return MANDU_POPULARITY[preset.id] || 0;
}
function loadManduFilterState() {
  const fallback = { company: 'all', kind: 'all', sort: 'popular', favoritesOnly: false };
  try {
    const raw = localStorage.getItem(MANDU_FILTER_STORAGE_KEY);
    if (!raw) return fallback;
    return normalizeManduFilterState(JSON.parse(raw));
  } catch(e) {}
  return fallback;
}
function normalizeManduFilterState(value) {
  const companyList = new Set(['all', ...MANDU_PRESETS.map(p => p.maker)]);
  const kindList = new Set(['all', ...MANDU_PRESETS.map(p => manduKind(p))]);
  const company = value && companyList.has(value.company) ? value.company : 'all';
  const kind = value && kindList.has(value.kind) ? value.kind : 'all';
  const sort = value && ['popular', 'alpha'].includes(value.sort) ? value.sort : 'popular';
  return { company, kind, sort, favoritesOnly: Boolean(value?.favoritesOnly) };
}
function saveManduFilterState() {
  try {
    localStorage.setItem(MANDU_FILTER_STORAGE_KEY, JSON.stringify(manduFilterState));
  } catch(e) {}
}
function loadManduFavorites() {
  try {
    const raw = localStorage.getItem(MANDU_FAVORITES_STORAGE_KEY);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return new Set();
    const valid = arr.filter(id => MANDU_PRESETS.some(p => p.id === id));
    return new Set(valid);
  } catch(e) {}
  return new Set();
}
function saveManduFavorites() {
  try {
    localStorage.setItem(MANDU_FAVORITES_STORAGE_KEY, JSON.stringify([...manduFavoriteIds]));
  } catch(e) {}
}
function isManduFavorite(id) {
  return manduFavoriteIds.has(id);
}
function filteredManduPresets() {
  return MANDU_PRESETS.filter(preset => {
    if (manduFilterState.company !== 'all' && preset.maker !== manduFilterState.company) return false;
    if (manduFilterState.kind !== 'all' && manduKind(preset) !== manduFilterState.kind) return false;
    if (manduFilterState.favoritesOnly && !isManduFavorite(preset.id)) return false;
    return true;
  }).sort((a, b) => {
    if (manduFilterState.sort === 'alpha') {
      const nameOrder = a.name.localeCompare(b.name, 'ko');
      if (nameOrder !== 0) return nameOrder;
      const makerOrder = a.maker.localeCompare(b.maker, 'ko');
      if (makerOrder !== 0) return makerOrder;
      return manduSortScore(b) - manduSortScore(a);
    }
    const scoreA = manduSortScore(a);
    const scoreB = manduSortScore(b);
    if (scoreA !== scoreB) return scoreB - scoreA;
    if (a.maker !== b.maker) return a.maker.localeCompare(b.maker, 'ko');
    return a.name.localeCompare(b.name, 'ko');
  });
}

    localStorage.setItem(ROAST_FILTER_STORAGE_KEY, JSON.stringify(roastFilterState));

function filteredRoastPresets() {
  return ROAST_PRESETS.filter(preset => {
    if (roastFilterState.level !== 'all' && preset.roastLevel !== roastFilterState.level) return false;
    if (roastFilterState.originGroup !== 'all' && preset.originGroup !== roastFilterState.originGroup) return false;
    if (roastFilterState.process !== 'all' && preset.process !== roastFilterState.process) return false;
    return true;
  }).sort((a, b) => {
    if (roastFilterState.sort === 'alpha') {
      const nameOrder = a.name.localeCompare(b.name, 'ko');
      if (nameOrder !== 0) return nameOrder;
      const countryOrder = a.originCountry.localeCompare(b.originCountry, 'ko');
      if (countryOrder !== 0) return countryOrder;
      return roastTotalSec(a) - roastTotalSec(b);
    }
    const scoreA = roastSortScore(a);
    const scoreB = roastSortScore(b);
    if (scoreA !== scoreB) return scoreB - scoreA;
    const countryOrder = a.originCountry.localeCompare(b.originCountry, 'ko');
    if (countryOrder !== 0) return countryOrder;
    return a.name.localeCompare(b.name, 'ko');
  });
}

function loadActiveProfileId() {
  try {
    const saved = localStorage.getItem(PROFILE_STORAGE_KEY);
    if (saved && TIMER_PROFILES[saved]) return saved;
  } catch(e) {}
  return 'roast';
}
function ramenPresetById(id) {
  return RAMEN_PRESETS.find(preset => preset.id === id) || RAMEN_PRESETS[0];
}
function loadSelectedRamenPresetId() {
  try {
    const saved = localStorage.getItem(RAMEN_PRESET_STORAGE_KEY);
    if (saved && ramenPresetById(saved).id === saved) return saved;
  } catch(e) {}
  return RAMEN_PRESETS[0].id;
}
function setSelectedRamenPreset(id) {
  const preset = ramenPresetById(id);
  selectedRamenPresetId = preset.id;
  try { localStorage.setItem(RAMEN_PRESET_STORAGE_KEY, preset.id); } catch(e) {}
  return preset;
}
function presetTotalSec(preset) {
  return preset.steps.reduce((sum, step) => sum + step.durationSec, 0);
}
function ramenMilestones(id = selectedRamenPresetId) {
  return ramenPresetById(id).steps.map(step => ({ ...step }));
}
function currentProfile() {
  return TIMER_PROFILES[activeProfileId] || TIMER_PROFILES.roast;
}
function defaultMilestonesFor(id = activeProfileId) {
  if (id === 'roast') return roastPresetById(selectedRoastPresetId).milestones.map(ms => ({ ...ms }));
  if (id === 'ramen') return ramenMilestones();
  if (id === 'mandu') return manduMilestones();
  if (id === 'egg') return eggMilestones();
  const profile = TIMER_PROFILES[id] || TIMER_PROFILES.roast;
  return profile.milestones.map(ms => ({ ...ms }));
}
function ramenKind(preset) {
  return ['비빔', '볶음', '짜장'].includes(preset.type) ? 'mix' : 'boil';
}
function ramenKindLabel(kind) {
  return kind === 'mix' ? '비비는 라면' : '끓이는 라면';
}
function ramenSortLabel(sort) {
  return sort === 'alpha' ? '가나다순' : '인기순';
}
function ramenSortScore(preset) {
  return RAMEN_POPULARITY[preset.id] || 0;
}
function loadRamenFilterState() {
  const fallback = { company: 'all', kind: 'all', sort: 'popular', favoritesOnly: false };
  try {
    const raw = localStorage.getItem(RAMEN_FILTER_STORAGE_KEY);
    if (!raw) return fallback;
    return normalizeRamenFilterState(JSON.parse(raw));
  } catch(e) {}
  return fallback;
}
function normalizeRamenFilterState(value) {
  const companyList = new Set(['all', ...RAMEN_PRESETS.map(p => p.maker)]);
  const company = value && companyList.has(value.company) ? value.company : 'all';
  const kind = value && ['all', 'boil', 'mix'].includes(value.kind) ? value.kind : 'all';
  const sort = value && ['popular', 'alpha'].includes(value.sort) ? value.sort : 'popular';
  return { company, kind, sort, favoritesOnly: Boolean(value?.favoritesOnly) };
}
function saveRamenFilterState() {
  try {
    localStorage.setItem(RAMEN_FILTER_STORAGE_KEY, JSON.stringify(ramenFilterState));
  } catch(e) {}
}
function loadRamenFavorites() {
  try {
    const raw = localStorage.getItem(RAMEN_FAVORITES_STORAGE_KEY);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return new Set();
    const valid = arr.filter(id => RAMEN_PRESETS.some(p => p.id === id));
    return new Set(valid);
  } catch(e) {}
  return new Set();
}
function saveRamenFavorites() {
  try {
    localStorage.setItem(RAMEN_FAVORITES_STORAGE_KEY, JSON.stringify([...ramenFavoriteIds]));
  } catch(e) {}
}
function isRamenFavorite(id) {
  return ramenFavoriteIds.has(id);
}
function filteredRamenPresets() {
  return RAMEN_PRESETS.filter(preset => {
    if (ramenFilterState.company !== 'all' && preset.maker !== ramenFilterState.company) return false;
    if (ramenFilterState.kind !== 'all' && ramenKind(preset) !== ramenFilterState.kind) return false;
    if (ramenFilterState.favoritesOnly && !isRamenFavorite(preset.id)) return false;
    return true;
  }).sort((a, b) => {
    if (ramenFilterState.sort === 'alpha') {
      const nameOrder = a.name.localeCompare(b.name, 'ko');
      if (nameOrder !== 0) return nameOrder;
      const makerOrder = a.maker.localeCompare(b.maker, 'ko');
      if (makerOrder !== 0) return makerOrder;
      return ramenSortScore(b) - ramenSortScore(a);
    }
    const scoreA = ramenSortScore(a);
    const scoreB = ramenSortScore(b);
    if (scoreA !== scoreB) return scoreB - scoreA;
    if (a.maker !== b.maker) return a.maker.localeCompare(b.maker, 'ko');
    return a.name.localeCompare(b.name, 'ko');
  });
}
function recipeKey() {
  return `${RECIPE_STORAGE_PREFIX}${activeProfileId}:v1`;
}

// 누적 알람 시점 계산 (i번째 마일스톤의 발화 시점 = 0~i 구간의 합)
function triggerAt(idx) {
  let sum = 0;
  for (let i = 0; i <= idx; i++) sum += S.milestones[i].durationSec;
  return sum;
}
// 전체 합산 시간
function totalDuration() {
  return S.milestones.reduce((s, ms) => s + ms.durationSec, 0);
}

const RING_R = 86, RING_C = 2 * Math.PI * RING_R;
const ringEl = document.getElementById('ring-progress');
ringEl.style.strokeDasharray  = RING_C;
ringEl.style.strokeDashoffset = RING_C;
function setRingProgress(pct) {
  const p = Math.max(0, Math.min(1, pct));
  ringEl.style.strokeDashoffset = RING_C - RING_C * p;
  ringEl.classList.toggle('danger', p > RING_DANGER_THRESH);
}

function fmt(sec) {
  if (!Number.isFinite(sec) || sec < 0) sec = 0;
  return String(Math.floor(sec/60)).padStart(2,'0') + ':' +
         String(Math.floor(sec%60)).padStart(2,'0');
}
function fmtMs(ms) { return fmt(ms/1000); }
function htmlEscape(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}
function clampInt(value, min, max, fallback) {
  const num = Number(value);
  if (!Number.isFinite(num)) return fallback;
  return Math.min(max, Math.max(min, Math.round(num)));
}
function normalizeMilestone(item, idx) {
  const fallback = MS_DEFAULTS[Math.min(idx, MS_DEFAULTS.length - 1)] || MS_DEFAULTS[0];
  const name = String(item?.name || fallback.name).trim().slice(0, 20) || fallback.name;
  const icon = String(item?.icon || fallback.icon).trim().slice(0, 4) || fallback.icon;
  const emoji = String(item?.emoji || icon || fallback.emoji).trim().slice(0, 4) || fallback.emoji;
  const durationSec = clampInt(item?.durationSec, 10, 60 * 60, fallback.durationSec);
  return {
    name,
    icon,
    durationSec,
    reached: false,
    emoji,
    alertMsg: String(item?.alertMsg || `${name} 시간이 되었습니다.`).slice(0, 120),
    actionLabel: String(item?.actionLabel || `${name} 완료`).slice(0, 40),
  };
}
function setTargetTemp(value) {
  const input = document.getElementById('target-temp');
  const fallback = currentProfile().defaultTargetTemp || DEFAULT_TARGET_TEMP;
  input.value = clampInt(value, 100, 300, fallback);
}
function getTargetTemp() {
  const fallback = currentProfile().defaultTargetTemp || DEFAULT_TARGET_TEMP;
  return clampInt(document.getElementById('target-temp').value, 100, 300, fallback);
}
function saveRecipe() {
  try {
    const payload = {
      preheatTargetSec: S.preheatTargetSec,
      targetTemp: getTargetTemp(),
      milestones: S.milestones.map(ms => ({
        name: ms.name,
        icon: ms.icon,
        durationSec: ms.durationSec,
        emoji: ms.emoji,
        alertMsg: ms.alertMsg,
        actionLabel: ms.actionLabel,
      })),
    };
    if (activeProfileId === 'roast') payload.selectedPresetId = selectedRoastPresetId;
    if (activeProfileId === 'ramen') payload.selectedPresetId = selectedRamenPresetId;
    if (activeProfileId === 'mandu') {
      payload.selectedPresetId = selectedManduPresetId;
      payload.manduFrozen = selectedManduFrozen;
    }
    if (activeProfileId === 'egg') {
      payload.selectedPresetId = selectedEggPresetId;
      payload.eggCold = selectedEggCold;
    }
    localStorage.setItem(recipeKey(), JSON.stringify(payload));
  } catch(e) {}
}
function loadRecipe() {
  try {
    const raw = localStorage.getItem(recipeKey()) ||
      (activeProfileId === 'roast' ? localStorage.getItem(LEGACY_RECIPE_STORAGE_KEY) : null);
    if (!raw) {
      if (activeProfileId === 'roast') {
        const roastPreset = roastPresetById(selectedRoastPresetId);
        S.preheatTargetSec = roastPreset.preheatSec;
        setTargetTemp(roastPreset.preheatTemp);
      } else {
        setTargetTemp(currentProfile().defaultTargetTemp || DEFAULT_TARGET_TEMP);
      }
      return;
    }
    const saved = JSON.parse(raw);
    if (activeProfileId === 'roast' && saved.selectedPresetId && roastPresetById(saved.selectedPresetId).id === saved.selectedPresetId) {
      selectedRoastPresetId = saved.selectedPresetId;
      MS_DEFAULTS = defaultMilestonesFor(activeProfileId);
      S.milestones = MS_DEFAULTS.map(d => ({ ...d, reached: false }));
    }
    if (activeProfileId === 'ramen' && saved.selectedPresetId && ramenPresetById(saved.selectedPresetId).id === saved.selectedPresetId) {
      setSelectedRamenPreset(saved.selectedPresetId);
      MS_DEFAULTS = defaultMilestonesFor(activeProfileId);
      S.milestones = MS_DEFAULTS.map(d => ({ ...d, reached: false }));
    }
    if (activeProfileId === 'mandu' && typeof saved.manduFrozen === 'boolean') {
      selectedManduFrozen = saved.manduFrozen;
      try { localStorage.setItem(MANDU_STATE_STORAGE_KEY, JSON.stringify({ selectedPresetId: selectedManduPresetId, frozen: selectedManduFrozen })); } catch(e) {}
    }
    if (activeProfileId === 'mandu' && saved.selectedPresetId && manduPresetById(saved.selectedPresetId).id === saved.selectedPresetId) {
      setSelectedManduPreset(saved.selectedPresetId);
      MS_DEFAULTS = defaultMilestonesFor(activeProfileId);
      S.milestones = MS_DEFAULTS.map(d => ({ ...d, reached: false }));
    }
    if (activeProfileId === 'egg' && typeof saved.eggCold === 'boolean') {
      selectedEggCold = saved.eggCold;
      saveSelectedEggState();
    }
    if (activeProfileId === 'egg' && saved.selectedPresetId && eggPresetById(saved.selectedPresetId).id === saved.selectedPresetId) {
      setSelectedEggPreset(saved.selectedPresetId);
      MS_DEFAULTS = defaultMilestonesFor(activeProfileId);
      S.milestones = MS_DEFAULTS.map(d => ({ ...d, reached: false }));
    }
    const roastPreset = roastPresetById(selectedRoastPresetId);
    if (activeProfileId === 'roast') {
      S.preheatTargetSec = clampInt(saved.preheatTargetSec, 30, 60 * 60, roastPreset.preheatSec);
      setTargetTemp(clampInt(saved.targetTemp, 100, 300, roastPreset.preheatTemp));
    } else {
      S.preheatTargetSec = clampInt(saved.preheatTargetSec, 30, 60 * 60, S.preheatTargetSec);
      setTargetTemp(saved.targetTemp);
    }
    if (Array.isArray(saved.milestones) && saved.milestones.length) {
      S.milestones = saved.milestones.slice(0, 12).map(normalizeMilestone);
    }
  } catch(e) {
    setTargetTemp(currentProfile().defaultTargetTemp || DEFAULT_TARGET_TEMP);
  }
}
function isProfileSwitchLocked() {
  return S.masterRunning || S.preheatRunning || (S.masterElapsed > 0 && !S.masterDone);
}
function updateModeTabs() {
  const locked = isProfileSwitchLocked();
  document.querySelectorAll('[data-profile-tab]').forEach(btn => {
    const selected = btn.dataset.profileTab === activeProfileId;
    btn.setAttribute('aria-selected', String(selected));
    btn.tabIndex = selected ? 0 : -1;
    btn.disabled = locked;
  });
}
function setMasterIdleButton() {
  const btn = document.getElementById('start-btn');
  btn.textContent = currentProfile().startButton;
  btn.className = 'start-btn';
  btn.style.cursor = '';
}
function resetMasterToIdleState() {
  S.masterRunning = false;
  S.masterStartTs = null;
  S.masterElapsed = 0;
  S.masterDone = false;
  S.extensionAddedSec = 0;
  document.getElementById('master-status').textContent = '대기 중';
  document.getElementById('master-status').className = '';
  setMasterIdleButton();
  setRingProgress(0);
}
function renderRamenFilterControls() {
  const kindWrap = document.getElementById('preset-kind-filters');
  const brandWrap = document.getElementById('preset-brand-filters');
  const sortWrap = document.getElementById('preset-sort-filters');
  const stateWrap = document.getElementById('preset-state-filters');
  const favoritesToggle = document.getElementById('preset-favorites-toggle');

  if (!kindWrap || !brandWrap || !sortWrap || !favoritesToggle) return;
  kindWrap.hidden = false;
  brandWrap.hidden = false;
  sortWrap.hidden = false;
  if (stateWrap) {
    stateWrap.hidden = true;
    stateWrap.innerHTML = '';
  }
  favoritesToggle.hidden = false;

  const kindOptions = [
    { id: 'all', label: '전체' },
    { id: 'boil', label: '끓이는 라면' },
    { id: 'mix', label: '비비는 라면' },
  ];
  const sortOptions = [
    { id: 'popular', label: '인기순' },
    { id: 'alpha', label: '가나다순' },
  ];
  const brands = ['all', ...new Set(RAMEN_PRESETS.map(p => p.maker))];

  kindWrap.innerHTML = kindOptions.map(opt =>
    `<button class="preset-chip ${ramenFilterState.kind === opt.id ? 'active' : ''}" type="button" onclick="setRamenFilter('kind', '${opt.id}')">${htmlEscape(opt.label)}</button>`
  ).join('');

  sortWrap.innerHTML = sortOptions.map(opt =>
    `<button class="preset-chip ${ramenFilterState.sort === opt.id ? 'active' : ''}" type="button" onclick="setRamenFilter('sort', '${opt.id}')">${htmlEscape(opt.label)}</button>`
  ).join('');

  brandWrap.innerHTML = brands.map(brand => {
    const label = brand === 'all' ? '전체' : brand;
    return `<button class="preset-chip ${ramenFilterState.company === brand ? 'active' : ''}" type="button" onclick="setRamenFilter('company', '${brand}')">${htmlEscape(label)}</button>`;
  }).join('');

  favoritesToggle.classList.toggle('fav-on', ramenFilterState.favoritesOnly);
  favoritesToggle.textContent = ramenFilterState.favoritesOnly ? '★ 즐겨찾기만' : '☆ 즐겨찾기만';
}
function renderPresetMeta(badges) {
  return badges.map(badge => {
    const label = htmlEscape(badge.label);
    const value = htmlEscape(badge.value);
    return `<span class="preset-detail-badge">${label} <strong>${value}</strong></span>`;

function focusableIn(root) {

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep() {
  try {
    const ctx = getACtx();
    [[880,0,.15],[1320,.2,.15],[880,.4,.15],[1320,.6,.3]].forEach(([f,s,d]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'square';
      g.gain.setValueAtTime(.22, ctx.currentTime+s);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+s+d);
      o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d+.05);
    });
  } catch(e) {}
}
function startAlarm() { stopAlarm(); playBeep(); S.alertInterval = setInterval(playBeep, ALARM_INTERVAL_MS); }
function stopAlarm()  { clearInterval(S.alertInterval); S.alertInterval = null; }
function vibe()       { if (navigator.vibrate) navigator.vibrate([500,300,500,300,500]); }

// ─── Wake Lock ────────────────────────────────────────────────────────────────
const wlDot  = document.getElementById('wakelock-dot');
const wlText = document.getElementById('wakelock-text');

}

async function requestWakeLock() {
  if (!S.wakeLockSupported) return;
  try {
    S.wakeLock = await navigator.wakeLock.request('screen');

  } catch(e) {}
}

}

// ─── Alert ────────────────────────────────────────────────────────────────────
function enqueueAlert(ms) {

}
function _showNextAlert() {
  if (!S.alertQueue.length) return;
  const ms = S.alertQueue.shift();
  S.alertActive = true;
  const queueSize = S.alertQueue.length + 1;
  document.getElementById('alert-emoji').textContent = ms.emoji;
  document.getElementById('alert-title').textContent = queueSize > 1
    ? `🚨 ${ms.name} 알람 · 1/${queueSize}`
    : `🚨 ${ms.name} 알람`;
  document.getElementById('alert-msg').textContent   = ms.alertMsg;
  document.getElementById('alert-dismiss').textContent = ms.actionLabel || `${ms.name} 확인`;
  openManagedModal('alert-modal', '#alert-dismiss');

}
function dismissAlert() {

// ─── Master Status ────────────────────────────────────────────────────────────
function updateMasterStatus(es) {
  if (S.masterDone) return;
  const el     = document.getElementById('master-status');
  const active = S.milestones.find(ms => !ms.reached);
  if (!active) { el.textContent = '완료'; el.className = 'done-ms'; return; }

  const activeIdx = S.milestones.indexOf(active);
  const trigger   = triggerAt(activeIdx);
  const remSec    = trigger - es;

  el.textContent = `${active.icon} ${active.name}`;
  el.className = remSec <= 30 && remSec > 0 ? 'active-ms danger-ms' : 'active-ms';

// ─── Ring + Countdown sync ────────────────────────────────────────────────────
function syncRingAndCountdown() {
  const es        = S.masterElapsed / 1000;
  const total     = totalDuration();
  setRingProgress(total > 0 ? es / total : 0);
  setMasterReadout(es);
  updateMasterReference();
  updateMilestoneProgress(es);
}

// ─── RAF 루프 ─────────────────────────────────────────────────────────────────
function isAnyTimerRunning() { return S.masterRunning || S.preheatRunning; }
function ensureLoopRunning() { if (!S.rafId) unifiedLoop(); }

function unifiedLoop() {
  if (!isAnyTimerRunning()) { S.rafId = null; return; }
  S.rafId = requestAnimationFrame(unifiedLoop);
  const now = Date.now();

  if (S.masterRunning) {
    S.masterElapsed = now - S.masterStartTs;
    const es    = S.masterElapsed / 1000;
    const total = totalDuration();

    setMasterReadout(es);
    setRingProgress(total > 0 ? es / total : 0);
    updateMasterReference();
    updateMasterStatus(es);

    // 마일스톤 알람 체크 — triggerAt(i) 기준
    for (let i = 0; i < S.milestones.length; i++) {
      const ms = S.milestones[i];
      if (!ms.reached && es >= triggerAt(i)) {
        ms.reached = true;
        if (i === lastMsIdx()) { if (!S.extActive) queueExtModal(); }
        else                   { enqueueAlert(ms); }
        renderMilestones();
      }
    }
    updateMilestoneProgress(es);
  }

  if (S.preheatRunning) updatePreheatUI(now);
}

// ─── Master ───────────────────────────────────────────────────────────────────

  S.extensionAddedSec = 0;

  setRoastMode();

  releaseWakeLock();

    const btn = document.getElementById('start-btn');
    btn.textContent = '▶ 재개'; btn.className = 'start-btn';

    document.getElementById('master-status').className = '';
  }
}

// ─── Milestone Progress ───────────────────────────────────────────────────────
function updateMilestoneProgress(es) {
  S.milestones.forEach((ms, i) => {
    const trigger = triggerAt(i);
    const start   = trigger - ms.durationSec;
    const segEl   = es - start;
    const pct     = Math.min(100, Math.max(0, (segEl / ms.durationSec) * 100));

    const bar = document.getElementById(`ms-bar-${i}`);
    if (bar) bar.style.transform = `scaleX(${pct / 100})`;

    const tel = document.getElementById(`ms-time-${i}`);
    if (tel) {
      if (ms.reached) {
        tel.textContent = '✓ ' + fmt(ms.durationSec);
        tel.classList.remove('urgent');
      } else if (S.masterElapsed > 0 && es >= start) {
        const rem = trigger - es;
        tel.textContent = (rem < 0 ? '+' : '') + fmt(Math.abs(rem));
        // 30초 이하면 빨간색으로 변경
        tel.classList.toggle('urgent', rem <= 30 && rem > 0);
      } else {
        tel.textContent = fmt(ms.durationSec);
        tel.classList.remove('urgent');
      }
    }

    const lbl = document.getElementById(`ms-label-${i}`);
    if (lbl) lbl.textContent = fmt(ms.durationSec);
  });
}

// ─── Preheat ──────────────────────────────────────────────────────────────────
function togglePreheat() {
  const btn = document.getElementById('ph-start');
  if (S.preheatRunning) {
    S.preheatElapsedMs = Date.now() - S.preheatStartTs;
    S.preheatRunning = false;
    if (!isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
    btn.textContent = '재개'; btn.classList.remove('active');
  } else {
    try { getACtx().resume(); } catch(e) {}
    S.preheatRunning = true;
    S.preheatStartTs = Date.now() - S.preheatElapsedMs;
    btn.textContent = '정지'; btn.classList.add('active');
    ensureLoopRunning();
  }
}
function updatePreheatUI(now) {
  const elapsed   = (now - S.preheatStartTs) / 1000;
  const remaining = Math.max(0, S.preheatTargetSec - elapsed);
  const pct       = Math.min(100, (elapsed / S.preheatTargetSec) * 100);
  const done      = elapsed >= S.preheatTargetSec;
  const dispEl = document.getElementById('preheat-display');
  dispEl.textContent = fmt(remaining);
  dispEl.className   = 'ph-time-big' + (done ? ' done' : ' running');
  const bar = document.getElementById('ph-bar');
  bar.style.transform = `scaleX(${pct / 100})`;
  bar.classList.toggle('reached', done);
  if (!S.preheatAlarm.reached && done) {
    S.preheatAlarm.reached = true;
    enqueueAlert(S.preheatAlarm);
    S.preheatElapsedMs = Date.now() - S.preheatStartTs;
    S.preheatRunning = false;
    if (!isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
    const btn = document.getElementById('ph-start');
    btn.textContent = '재개'; btn.classList.remove('active');
  }
}
function resetPreheat() {
  const wasRunning = S.preheatRunning;
  S.preheatRunning = false; S.preheatElapsedMs = 0; S.preheatAlarm.reached = false;
  if (wasRunning && !isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
  const d = document.getElementById('preheat-display');
  d.textContent = fmt(S.preheatTargetSec); d.className = 'ph-time-big';
  document.getElementById('ph-bar').style.transform = 'scaleX(0)';
  document.getElementById('ph-bar').classList.remove('reached');
  const btn = document.getElementById('ph-start');
  btn.textContent = '시작'; btn.classList.remove('active');
}
function adjustPreheat(delta) {
  const nv = S.preheatTargetSec + delta;
  if (nv < 30) return;
  S.preheatTargetSec = nv;
  saveRecipe();
  if (S.preheatRunning) {
    const elapsed = (Date.now() - S.preheatStartTs) / 1000;
    if (elapsed < nv) S.preheatAlarm.reached = false;
    updatePreheatUI(Date.now());
  } else {
    const elapsed   = S.preheatElapsedMs / 1000;
    const remaining = Math.max(0, nv - elapsed);
    document.getElementById('preheat-display').textContent = fmt(remaining);
    if (elapsed < nv) S.preheatAlarm.reached = false;
  }
}

// ─── Milestones ───────────────────────────────────────────────────────────────
function startRename(idx, spanEl) {
  if (S.milestones[idx].reached) return;
  const input = document.createElement('input');
  input.className = 'ms-name-input';
  input.value     = S.milestones[idx].name;
  input.maxLength = 20;
  let committed = false;
  function commit() {
    if (committed) return; committed = true;
    const val = input.value.trim();
    if (val) {
      S.milestones[idx].name = val;
      S.milestones[idx].alertMsg = `${val} 시간이 되었습니다.`;
      S.milestones[idx].actionLabel = `${val} 완료`;
      saveRecipe();
    }
    const span = document.createElement('span');
    span.className = 'ms-name'; span.title = '탭해서 이름 변경';
    span.textContent = S.milestones[idx].name;
    span.onclick = () => startRename(idx, span);
    input.replaceWith(span);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = S.milestones[idx].name; input.blur(); }
  });
  spanEl.replaceWith(input); input.focus(); input.select();
}

function adjustMilestone(idx, delta) {
  const ms = S.milestones[idx];
  if (ms.reached) return;
  const nv = ms.durationSec + delta;
  if (nv < 10) return;
  ms.durationSec = nv;
  // 각 타이머는 독립 — 전체 시간은 합산으로 자동 반영
  saveRecipe();
  renderMilestones();
  syncRingAndCountdown();
}

function renderMilestones() {
  const es    = S.masterElapsed / 1000;
  const count = S.milestones.length;

  document.getElementById('milestones-section').innerHTML =
    S.milestones.map((ms, i) => {
      const trigger = triggerAt(i);
      const start   = trigger - ms.durationSec;
      const isLast  = i === lastMsIdx();
      const canDelete = count > 1 && !isLast && !ms.reached;
      const dis     = ms.reached ? 'disabled' : '';
      const safeIcon = htmlEscape(ms.icon);
      const safeName = htmlEscape(ms.name);

      // 시간 표시: 진행 중이면 남은 구간 시간, 아니면 구간 시간 자체
      let timeStr;
      if (ms.reached) {
        timeStr = '✓ ' + fmt(ms.durationSec);
      } else if (S.masterElapsed > 0 && es >= start) {
        const rem = trigger - es;
        timeStr = (rem < 0 ? '+' : '') + fmt(Math.abs(rem));
      } else {
        timeStr = fmt(ms.durationSec);
      }

      const isActive = !ms.reached && es >= start &&
                       (i === 0 || S.milestones[i-1].reached);

      return `<div class="milestone-card ${ms.reached?'reached':''} ${isActive?'active-ms':''}">
        <div class="ms-header">
          <span class="ms-icon">${safeIcon}</span>
          <div class="ms-info">
            <div class="ms-name-row">
              <span class="ms-name ${ms.reached?'readonly':''}"
                    onclick="${ms.reached ? '' : `startRename(${i},this)`}"
                    title="${ms.reached ? '' : '탭해서 이름 변경'}">${safeName}</span>
              <span class="next-action-label">다음 행동</span>
              <span class="reached-badge">완료</span>
            </div>
            <div class="ms-time-display" id="ms-time-${i}">${timeStr}</div>
          </div>
          <div class="ms-target-label" id="ms-label-${i}">${fmt(ms.durationSec)}</div>
          ${canDelete ? `<button class="ms-delete-btn" onclick="deleteMilestone(${i})" title="삭제" aria-label="${safeName} 삭제">×</button>` : ''}
        </div>
        <div class="ms-progress-wrap">
          <div class="ms-progress-bar" id="ms-bar-${i}"></div>
        </div>
        <div class="adj-grid-6">
          <button class="adj-btn minus" onclick="adjustMilestone(${i},-60)" ${dis}>−1분</button>
          <button class="adj-btn minus" onclick="adjustMilestone(${i},-30)" ${dis}>−30초</button>
          <button class="adj-btn minus" onclick="adjustMilestone(${i},-10)" ${dis}>−10초</button>
          <button class="adj-btn plus"  onclick="adjustMilestone(${i}, 10)" ${dis}>+10초</button>
          <button class="adj-btn plus"  onclick="adjustMilestone(${i}, 30)" ${dis}>+30초</button>
          <button class="adj-btn plus"  onclick="adjustMilestone(${i}, 60)" ${dis}>+1분</button>
        </div>
      </div>`;
    }).join('');
}

function addMilestone() {
  const newDur  = 120; // 새 타이머 기본 2분
  const newName = `알람 ${S.milestones.length}`;
  // 마지막(로스팅 완료) 앞에 삽입만 — 마지막은 건드리지 않음
  // 전체 시간은 newDur(2분)만큼만 늘어남
  S.milestones.splice(lastMsIdx(), 0, {
    name: newName, icon: '⏰', durationSec: newDur,
    reached: false, emoji: '⏰',
    alertMsg: `${newName} 시간이 되었습니다.`,
    actionLabel: `${newName} 완료`,
  });
  saveRecipe();
  renderMilestones();
  syncRingAndCountdown();
}

function deleteMilestone(idx) {
  const ms = S.milestones[idx];
  if (!ms || S.milestones.length <= 1 || idx === lastMsIdx() || ms.reached) return;
  S.alertQueue = S.alertQueue.filter(a => a !== S.milestones[idx]);
  S.milestones.splice(idx, 1);
  saveRecipe();
  renderMilestones();
  syncRingAndCountdown();
}

// ─── DEV ──────────────────────────────────────────────────────────────────────
function toggleDev() {
  S.devMode = !S.devMode;
  document.getElementById('dev-btn').classList.toggle('on', S.devMode);
  document.getElementById('dev-btn').textContent = S.devMode ? '🔧 DEV' : 'DEV';
  if (S.devMode) { document.getElementById('dev-panel').classList.add('open'); renderDevPanel(); }
  else           { document.getElementById('dev-panel').classList.remove('open'); }
}
function renderDevPanel() {
  const profile = currentProfile();
  const items = [
    ...(profile.preheat ? [{ label:'🔥 예열 완료 알람', fn: () => enqueueAlert(S.preheatAlarm) }] : []),
    ...S.milestones.slice(0,-1).map(ms => ({
      label: `${ms.icon} ${ms.name} 알람`,
      fn: () => enqueueAlert(ms),
    })),
    { label:`✅ ${profile.label} 완료 (연장 팝업)`, fn: () => queueExtModal() },
  ];
  document.getElementById('dev-grid').innerHTML =
    items.map((it,i) => `<div class="dev-row">
      <span class="dev-row-label">${htmlEscape(it.label)}</span>
      <button class="dev-trigger" data-dev="${i}">▶ 미리보기</button>
    </div>`).join('');
  document.getElementById('dev-grid').onclick = e => {
    const btn = e.target.closest('[data-dev]');
    if (!btn) return;
    try { getACtx().resume(); } catch(e2) {}
    items[+btn.dataset.dev].fn();
  };
}

document.addEventListener('keydown', e => {
  if (!S.activeModalId) return;
  const modal = document.getElementById(S.activeModalId);
  if (!modal) return;

  if (e.key === 'Escape' && S.activeModalId === 'confirm-overlay') {
    e.preventDefault();
    closeConfirm();
    return;
  }

  if (e.key !== 'Tab') return;
  const items = focusableIn(modal);
  if (!items.length) return;
  const first = items[0];
  const last = items[items.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault();
    last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault();
    first.focus();
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadRecipe();
updateProfileUI();
document.getElementById('preheat-display').textContent = fmt(S.preheatTargetSec);
document.getElementById('target-temp').addEventListener('change', () => {
  setTargetTemp(getTargetTemp());
  saveRecipe();
});
renderMilestones();
syncRingAndCountdown();
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && S.masterRunning) await requestWakeLock();
});
if (location.protocol !== 'file:') {
  const manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = 'manifest.webmanifest';
  document.head.appendChild(manifestLink);
}
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
