<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080604">
<title>☕ Roast Timer</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080604;
  --surface: #17110c;
  --surface2: #24180f;
  --surface3: #302116;
  --border: #493323;
  --border-strong: #725033;
  --text: #fff4e2;
  --text-dim: #b99f7c;
  --text-mid: #dec6a8;
  --accent: #ffb24a;
  --accent-strong: #ffd07a;
  --accent-dim: #7a4518;
  --accent-bg: #2b190a;
  --ink-on-accent: #1a0d02;
  --warn: #ff5a52;
  --warn-dim: #7a211d;
  --warn-bg: #2b0f0d;
  --green: #58c878;
  --green-bright: #7eff9d;
  --green-bg: #102716;
  --dev: #b894ff;
  --dev-dim: #3d2f58;
  --focus: #ffd38a;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
button, input { font: inherit; }
button:focus-visible,
input:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
}

html {
  /* 100dvh 기준 — iOS Safari 주소창 높이 변동 대응 */
  height: 100dvh;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  overflow-x: hidden;
}

/* ── Flash overlay ── */
#flash-overlay {
  position: fixed; inset: 0; z-index: 900;
  pointer-events: none; background: var(--warn); opacity: 0;
}
#flash-overlay.flashing { animation: flash-pulse 0.85s ease-in-out infinite; }
@keyframes flash-pulse { 0%,100%{opacity:0} 50%{opacity:0.28} }

/* ── Confirm overlay (초기화 이중확인) ── */
#confirm-overlay {
  position: fixed; inset: 0; z-index: 1100;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.78); backdrop-filter: blur(8px); padding: 24px;
}
#confirm-overlay.active { display: flex; }
#confirm-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 22px;
  width: 100%; max-width: 320px; padding: 28px 22px 20px; text-align: center;
  animation: modal-in 0.18s ease-out;
}
#confirm-box h3 {
  font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700;
  color: var(--text); margin-bottom: 8px;
}
#confirm-box p { font-size: 14px; color: var(--text-mid); margin-bottom: 22px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-cancel {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text-mid); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  padding: 14px; cursor: pointer; transition: background 0.1s;
}
.confirm-cancel:active { background: var(--border); }
.confirm-ok {
  flex: 1; background: var(--warn-dim); border: 1px solid var(--warn); border-radius: 12px;
  color: var(--warn); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  padding: 14px; cursor: pointer; transition: background 0.1s;
}
.confirm-ok:active { background: var(--warn); color: white; }

/* ── Alert Modal ── */
#alert-modal {
  position: fixed; inset: 0; z-index: 1000;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.82); backdrop-filter: blur(10px); padding: 24px;
}
#alert-modal.active { display: flex; }
#alert-content {
  background: var(--warn-bg); border: 1.5px solid var(--warn); border-radius: 28px;
  width: 100%; max-width: 360px; padding: 40px 28px 28px;
  text-align: center;
  box-shadow: 0 0 80px rgba(255,90,82,0.28);
  animation: modal-in 0.2s ease-out;
}
@keyframes modal-in { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
#alert-emoji { font-size: 56px; margin-bottom: 14px; display: block; }
#alert-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 34px;
  letter-spacing: 1.5px; color: var(--warn); margin-bottom: 10px;
}
#alert-msg { color: var(--text-mid); font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
#alert-dismiss {
  background: var(--warn); color: white; border: none; border-radius: 16px;
  width: 100%; padding: 20px;
  font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
  box-shadow: 0 4px 20px rgba(255,90,82,0.32);
  transition: transform 0.1s, opacity 0.1s;
}
#alert-dismiss:active { transform: scale(0.97); opacity: 0.9; }

/* ── Extension Modal ── */
#ext-modal {
  position: fixed; inset: 0; z-index: 1000;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 24px;
}
#ext-modal.active { display: flex; }
#ext-content {
  background: var(--green-bg); border: 1.5px solid var(--green); border-radius: 28px;
  width: 100%; max-width: 360px; padding: 36px 24px 24px;
  text-align: center; box-shadow: 0 0 60px rgba(126,255,157,0.12);
  animation: modal-in 0.2s ease-out;
}
#ext-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; color:var(--green-bright); margin-bottom:6px; }
#ext-sub { color:var(--text-mid); font-size:15px; margin-bottom:24px; }
.ext-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.ext-btn {
  background:var(--surface2); border:1px solid var(--border); border-radius:14px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700;
  padding:18px 12px; cursor:pointer; transition:background 0.15s;
}
.ext-btn:active { background:var(--surface); }
.ext-btn.highlight { background:var(--green-bg); border-color:var(--green); color:var(--green-bright); }
#ext-finish {
  background:transparent; border:1px solid var(--border); border-radius:12px;
  color:var(--text-mid); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
  padding:14px; width:100%; cursor:pointer; transition:color 0.15s;
}
#ext-finish:active { color:var(--text); }

/* ════════════════════════════════
   CENTERED FULL-HEIGHT LAYOUT
════════════════════════════════ */
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100dvh;
}
#app {
  width: 100%; max-width: 390px;
  display: flex; flex-direction: column;
  padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
  gap: 7px;
}

/* ── TOP SECTION — Preheat ── */
#top-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 12px 10px;
}

.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-dim);
  display: block; margin-bottom: 8px;
}

/*
  Preheat 6-col grid:
  [timer × 3] [온도] [시작] [초기화]
  adj-grid-6 uses same 6 cols + same gap → pixel-perfect vertical alignment
*/
.ph-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  align-items: center;
  margin-bottom: 5px;
}
/* countdown timer spans 3 cols */
.ph-time-big {
  grid-column: span 3;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px; letter-spacing: 1px; line-height: 1;
  color: var(--text);
}
.ph-time-big.running { color: var(--accent-strong); }
.ph-time-big.done    { color: var(--green-bright); }

/* shared chip style for target time + temp */
.info-chip {
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text-mid);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 0 4px;
  display: flex; align-items: center; justify-content: center; gap: 2px;
  transition: color 0.3s, border-color 0.3s;
  min-height: 40px; /* same as ph-ctrl-btn */
  white-space: nowrap; overflow: hidden;
}
.info-chip.near    { color: var(--accent-strong); border-color: var(--accent); }
.info-chip.reached { color: var(--green-bright); border-color: var(--green); }
.info-chip input {
  background: transparent; border: none; outline: none;
  color: inherit; font-family: inherit; font-size: inherit;
  width: 28px; text-align: center;
  -moz-appearance: textfield;
}
.temp-unit { color: var(--text-dim); font-size: 12px; }
.info-chip input::-webkit-inner-spin-button,
.info-chip input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* start / reset — same height as chips */
.ph-ctrl-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text-mid); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  min-height: 40px;
  cursor: pointer; text-align: center;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  padding: 0;
}
.ph-ctrl-btn:active { background: var(--border); }
.ph-ctrl-btn.start.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-strong); }
.ph-ctrl-btn.reset { color: var(--text-dim); }

/* progress bar full width across all 6 cols */
.ph-progress-row {
  margin-bottom: 4px;
}
.ph-progress-wrap { height: 2px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.ph-progress-bar  { height: 100%; width: 100%; background: var(--accent); border-radius: 99px; transform-origin: left center; transform: scaleX(0); transition: transform 0.4s linear; }
.ph-progress-bar.reached { background: var(--green-bright); }

/* Adj buttons — same 6-col grid, same gap=4px → perfect alignment */
.adj-grid-6 { display: grid; grid-template-columns: repeat(6,1fr); gap: 4px; }
.adj-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  min-height: 34px;
  padding: 6px 2px; cursor: pointer; text-align: center; line-height: 1.3;
  transition: background 0.1s;
}
.adj-btn:active:not(:disabled) { background: var(--border); }
.adj-btn.minus { color: var(--text-dim); }
.adj-btn.plus  { color: var(--accent-strong); }
.adj-btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

/* ── MASTER TIMER ── */
#master-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 16px 16px;
  text-align: center;
}
.master-ring-wrap {
  position: relative; margin: 0 auto 14px;
  width: min(210px, 54vw); height: min(210px, 54vw);
}
#master-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }
#ring-progress {
  fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round;
  transition: stroke-dashoffset 0.45s linear;
}
#ring-progress.danger { stroke: var(--warn); }
.master-time-inner {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); text-align: center;
  width: 100%;
}
/* master label: keep the center readout to one numeric timer */
#master-countdown {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; line-height: 1;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
#master-countdown.active { color: var(--accent-strong); }
#master-countdown.danger { color: var(--warn); }

/* 구분선 */
.ring-divider {
  display: none;
  width: 28px; height: 1px;
  background: var(--border);
  margin: 4px auto;
}

/* single central timer */
#master-time {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 12vw, 56px);
  letter-spacing: 2px; line-height: 1; color: var(--text);
}
#master-time.active { color: var(--accent-strong); }
#master-time.danger { color: var(--warn); }
#master-time.done { color: var(--green-bright); }
#master-status {
  font-size: 12px; letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--text-dim); margin-top: 5px; text-align: center;
}
#master-status.active-ms { color: var(--accent-strong); }
#master-status.danger-ms { color: var(--warn); }
#master-status.done-ms   { color: var(--green-bright); }
#master-reference {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 30px; margin: -4px auto 14px; padding: 6px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-mid); font-family: 'DM Mono', monospace;
  font-size: 12px; line-height: 1.2; letter-spacing: 0.2px;
}
#master-reference.extended {
  color: var(--green-bright);
  border-color: var(--green);
  background: var(--green-bg);
}

.master-btn-row { display: flex; gap: 8px; }
.start-btn {
  flex: 1; background: var(--accent); color: var(--ink-on-accent); border: none; border-radius: 13px;
  padding: 14px; font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.2px;
  transition: opacity 0.15s, transform 0.1s;
}
.start-btn:active { transform: scale(0.98); opacity: 0.88; }
.start-btn.running {
  background: var(--warn-bg);
  color: var(--warn);
  border: 1.5px solid var(--warn-dim);
  box-shadow: 0 0 16px rgba(255,90,82,0.14);
}
/* ✅ SUCCESS TONE */
.start-btn.done {
  background: var(--green-bg);
  border: 1.5px solid var(--green-bright);
  color: var(--green-bright);
  box-shadow: 0 0 20px rgba(126,255,157,0.14);
}
.start-btn.restart {
  background: var(--green-bg);
  border: 1.5px solid var(--green-bright);
  color: var(--green-bright);
  box-shadow: 0 0 20px rgba(126,255,157,0.14);
}
.reset-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 13px;
  color: var(--text-dim); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700; padding: 14px 16px; cursor: pointer;
  transition: background 0.1s, color 0.1s; white-space: nowrap;
}
.reset-btn:active { background: var(--border); color: var(--text); }

/* ── MILESTONES ── */
#milestones-section { display: flex; flex-direction: column; gap: 6px; }
.milestone-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px; transition: border-color 0.3s;
}
.milestone-card.reached   { border-color: var(--green-bright); }
.milestone-card.active-ms { border-color: var(--accent); background: var(--accent-bg); }
.ms-header { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.ms-icon   { font-size: 16px; flex-shrink: 0; }
.ms-info   { flex: 1; min-width: 0; }
.ms-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1px; }
.ms-name   { font-size: 12px; font-weight: 700; color: var(--text-mid); cursor: text; }
.ms-name:not(.readonly):hover { color: var(--text); }
.ms-name-input {
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  outline: none; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700; width: 100%; max-width: 120px; padding: 0 2px;
}
.reached-badge {
  display: none; background: var(--green-bright); color: var(--ink-on-accent);
  font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
  padding: 2px 6px; border-radius: 5px; flex-shrink: 0;
}
.milestone-card.reached .reached-badge { display: inline-block; }
.ms-time-display {
  display: none;
  font-family: 'DM Mono', monospace; font-size: 20px; color: var(--accent); letter-spacing: 1px;
  transition: color 0.3s;
}
.ms-time-display.urgent { color: var(--warn); }
.milestone-card.reached .ms-time-display { color: var(--green-bright); }
.ms-target-label {
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text-mid);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 7px;
  flex-shrink: 0; text-align: center; min-width: 54px;
}
.ms-progress-wrap { height: 2px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
.ms-progress-bar  { height: 100%; width: 100%; background: var(--accent); border-radius: 99px; transform-origin: left center; transform: scaleX(0); transition: transform 0.4s linear; }
.milestone-card.reached .ms-progress-bar { background: var(--green); }

/* 삭제 버튼 */
.ms-delete-btn {
  background: transparent; border: none;
  color: var(--text-dim); font-size: 15px; line-height: 1;
  cursor: pointer; padding: 2px 5px; border-radius: 5px; flex-shrink: 0;
  transition: color 0.15s, background 0.1s; margin-left: 2px;
}
.ms-delete-btn:active { color: var(--warn); }

/* 타이머 추가 버튼 */
#add-milestone-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: var(--radius); color: var(--text-mid);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  min-height: 42px;
  padding: 10px; cursor: pointer; width: 100%;
  transition: border-color 0.15s, color 0.15s, background 0.1s;
}
#add-milestone-btn:active { border-color: var(--accent); color: var(--accent-strong); }

/* ── BOTTOM ── */
#bottom-bar { display: flex; gap: 8px; align-items: center; }
#wakelock-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  min-height: 36px; font-size: 11px; font-weight: 700; color: var(--text-mid); flex: 1;
}
#wakelock-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border-strong); flex-shrink: 0; }
#wakelock-dot.on { background: var(--green-bright); }
#dev-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text-mid); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  min-height: 36px; padding: 6px 14px; cursor: pointer; white-space: nowrap;
  transition: background 0.15s, color 0.15s, border-color 0.15s; letter-spacing: 0.5px;
}
#dev-btn.on { background: var(--dev-dim); border-color: var(--dev); color: var(--dev); }

#dev-panel {
  display: none; background: var(--surface); border: 1px solid var(--dev);
  border-radius: var(--radius); padding: 12px;
}
#dev-panel.open { display: block; }
.dev-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--dev); margin-bottom: 8px; }
.dev-grid  { display: flex; flex-direction: column; gap: 5px; }
.dev-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 11px;
}
.dev-row-label { font-size: 13px; font-weight: 700; color: var(--text-mid); flex: 1; }
.dev-trigger {
  background: var(--dev-dim); border: 1px solid var(--dev); border-radius: 7px;
  color: var(--dev); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  min-height: 34px; padding: 5px 11px; cursor: pointer; transition: background 0.1s;
}
.dev-trigger:active { background: var(--dev); color: white; }

#app.roast-active {
  gap: 10px;
}
#app.roast-active #top-section,
#app.roast-active #add-milestone-btn,
#app.roast-active #dev-btn,
#app.roast-active #dev-panel,
#app.roast-active .milestone-card:not(.active-ms),
#app.roast-active .milestone-card .ms-target-label,
#app.roast-active .milestone-card .ms-delete-btn,
#app.roast-active .milestone-card .reached-badge {
  display: none;
}
#app.roast-active #bottom-bar {
  margin-top: 2px;
}
#app.roast-active .milestone-card.active-ms {
  border-color: var(--accent);
  background: var(--accent-bg);
  padding: 16px 14px;
}
#app.roast-active .milestone-card.active-ms .ms-header {
  align-items: center;
  margin-bottom: 10px;
}
#app.roast-active .milestone-card.active-ms .ms-name-row {
  align-items: flex-start;
  flex-direction: column;
  justify-content: flex-start;
}
#app.roast-active .milestone-card.active-ms .ms-icon {
  font-size: 24px;
}
.next-action-label {
  display: none;
}
#app.roast-active .next-action-label {
  display: block;
  color: var(--accent-strong);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 4px;
  order: -1;
}
#app.roast-active .milestone-card.active-ms .ms-name {
  color: var(--text);
  cursor: default;
  font-size: 16px;
}
#app.roast-active .milestone-card.active-ms .ms-target-label {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-strong);
  border-color: var(--accent);
  background: var(--surface3);
  font-size: 13px;
  min-height: 34px;
}
#app.roast-active .milestone-card.active-ms .ms-time-display {
  display: none;
}
#app.roast-active .milestone-card.active-ms .ms-progress-wrap {
  height: 6px;
  margin-bottom: 10px;
}
#app.roast-active .milestone-card.active-ms .adj-grid-6 {
  display: grid;
}
#app.roast-active .milestone-card.active-ms .adj-btn {
  background: var(--surface3);
  border-color: var(--accent-dim);
  font-size: 11px;
}
@media (pointer: coarse) {
  .info-chip,
  .ph-ctrl-btn,
  .adj-btn,
  #add-milestone-btn,
  .dev-trigger {
    min-height: 44px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  #flash-overlay.flashing {
    animation: none !important;
    opacity: 0.22;
  }
}
</style>
</head>
<body>

<div id="flash-overlay" aria-hidden="true"></div>

<!-- 초기화 이중확인 -->
<div id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <div id="confirm-box">
    <h3 id="confirm-title">초기화하시겠어요?</h3>
    <p>로스팅 타이머와 마일스톤이<br>모두 초기 상태로 돌아갑니다.</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-ok"     onclick="doReset()">초기화</button>
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alert-modal" role="alertdialog" aria-modal="true" aria-labelledby="alert-title" aria-describedby="alert-msg">
  <div id="alert-content">
    <span id="alert-emoji">🚨</span>
    <div id="alert-title">알람</div>
    <div id="alert-msg">메시지</div>
    <button id="alert-dismiss" onclick="dismissAlert()">알람 확인</button>
  </div>
</div>

<!-- Extension Modal -->
<div id="ext-modal" role="dialog" aria-modal="true" aria-labelledby="ext-title" aria-describedby="ext-sub">
  <div id="ext-content">
    <div id="ext-title">로스팅 완료 시점</div>
    <div id="ext-sub">더 구울 시간을 선택하거나 쿨링을 시작하세요.</div>
    <div class="ext-btns">
      <button class="ext-btn" onclick="extendRoast(3)">3분 더 굽기</button>
      <button class="ext-btn" onclick="extendRoast(4)">4분 더 굽기</button>
      <button class="ext-btn" onclick="extendRoast(5)">5분 더 굽기</button>
      <button class="ext-btn" onclick="extendRoast(6)">6분 더 굽기</button>
    </div>
    <button id="ext-finish" onclick="finishRoast()">쿨링 시작</button>
  </div>
</div>

<div id="app">

  <!-- TOP: Preheat -->
  <div id="top-section">
    <span class="section-label">예열 타이머</span>

    <!-- 6-col grid: [timer×3] [온도] [시작] [초기화] -->
    <div class="ph-grid">
      <div class="ph-time-big" id="preheat-display">10:00</div>
      <span class="info-chip">
        <input type="number" id="target-temp" value="220" min="100" max="300" aria-label="목표 온도">
        <span class="temp-unit">℃</span>
      </span>
      <button class="ph-ctrl-btn start" id="ph-start" onclick="togglePreheat()">시작</button>
      <button class="ph-ctrl-btn reset"              onclick="resetPreheat()">초기화</button>
    </div>

    <!-- progress bar full width -->
    <div class="ph-progress-row">
      <div class="ph-progress-wrap">
        <div class="ph-progress-bar" id="ph-bar"></div>
      </div>
    </div>

    <!-- adj buttons — same 6-col grid, same gap → pixel-perfect alignment -->
    <div class="adj-grid-6">
      <button class="adj-btn minus" onclick="adjustPreheat(-60)">−1분</button>
      <button class="adj-btn minus" onclick="adjustPreheat(-30)">−30초</button>
      <button class="adj-btn minus" onclick="adjustPreheat(-10)">−10초</button>
      <button class="adj-btn plus"  onclick="adjustPreheat( 10)">+10초</button>
      <button class="adj-btn plus"  onclick="adjustPreheat( 30)">+30초</button>
      <button class="adj-btn plus"  onclick="adjustPreheat( 60)">+1분</button>
    </div>
  </div>

  <!-- MASTER TIMER -->
  <div id="master-section">
    <div class="master-ring-wrap">
      <svg id="master-svg" viewBox="0 0 196 196" aria-hidden="true" focusable="false">
        <circle class="ring-bg" cx="98" cy="98" r="86"/>
        <circle id="ring-progress" cx="98" cy="98" r="86"/>
      </svg>
      <div class="master-time-inner">
        <div id="master-countdown" aria-live="polite">총 로스팅</div>
        <div class="ring-divider"></div>
        <div id="master-time">12:00</div>
        <div id="master-status" aria-live="polite">대기 중</div>
      </div>
    </div>
    <div id="master-reference" aria-live="polite">총 시간 12:00</div>
    <div class="master-btn-row">
      <button class="start-btn" id="start-btn" onclick="toggleMaster()">☕ 로스팅 시작</button>
      <button class="reset-btn" id="reset-btn" onclick="askReset()">초기화</button>
    </div>
  </div>

  <!-- MILESTONES -->
  <div id="milestones-section"></div>
  <button id="add-milestone-btn" onclick="addMilestone()">＋ 타이머 추가</button>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div id="wakelock-pill">
      <div id="wakelock-dot"></div>
      <span id="wakelock-text">화면 유지</span>
    </div>
    <button id="dev-btn" onclick="toggleDev()">DEV</button>
  </div>

  <!-- DEV PANEL -->
  <div id="dev-panel">
    <div class="dev-title">🔧 Dev · 알람 미리보기</div>
    <div class="dev-grid" id="dev-grid"></div>
  </div>

</div>

<script>
// ─── 상수 ────────────────────────────────────────────────────────────────────
const ALARM_INTERVAL_MS  = 1800;
const RING_DANGER_THRESH = 0.88;
const RECIPE_STORAGE_KEY = 'roast-timer:recipe:v1';
const DEFAULT_TARGET_TEMP = 220;

// durationSec = 각 구간 시간 (독립)
// 알람 발화 시점 = 앞 구간들의 합 (누적)
const MS_DEFAULTS = [
  { name:'뒤집기',      icon:'🔄', durationSec: 300,
    emoji:'🔄', alertMsg:'원두를 뒤집어 주세요! 균일한 로스팅을 위해 고르게 섞어 주세요.',
    actionLabel:'뒤집기 완료' },
  { name:'상태 체크',   icon:'👁️', durationSec: 300,
    emoji:'👁️', alertMsg:'원두 색상과 팝핑 소리를 확인해 주세요.',
    actionLabel:'상태 체크 완료' },
  { name:'로스팅 완료', icon:'✅', durationSec: 120,
    emoji:'✅', alertMsg:'목표 시간에 도달했습니다!',
    actionLabel:'완료 확인' },
];

// 누적 알람 시점 계산 (i번째 마일스톤의 발화 시점 = 0~i 구간의 합)
function triggerAt(idx) {
  let sum = 0;
  for (let i = 0; i <= idx; i++) sum += S.milestones[i].durationSec;
  return sum;
}
// 전체 합산 시간
function totalDuration() {
  return S.milestones.reduce((s, ms) => s + ms.durationSec, 0);
}

// ─── State ───────────────────────────────────────────────────────────────────
const S = {
  masterRunning: false,
  masterStartTs: null,
  masterElapsed: 0,
  masterDone: false,
  extensionAddedSec: 0,

  preheatRunning: false,
  preheatStartTs: null,
  preheatElapsedMs: 0,
  preheatTargetSec: 600,

  milestones: MS_DEFAULTS.map(d => ({ ...d, reached: false })),

  preheatAlarm: {
    reached: false, emoji:'🔥', name:'예열 완료',
    alertMsg:'예열이 완료되었습니다. 원두를 투입할 준비를 하세요!',
    actionLabel:'예열 완료 확인',
  },

  alertQueue: [],
  alertActive: false,
  alertInterval: null,
  extActive: false,
  extPending: false,
  devMode: false,
  activeModalId: null,
  lastFocusedEl: null,
  rafId: null,
  wakeLock: null,
  wakeLockSupported: ('wakeLock' in navigator),
};

// ─── 헬퍼 ────────────────────────────────────────────────────────────────────
function lastMsIdx() { return S.milestones.length - 1; }
function lastMs()    { return S.milestones[lastMsIdx()]; }

// ─── SVG Ring ─────────────────────────────────────────────────────────────────
const RING_R = 86, RING_C = 2 * Math.PI * RING_R;
const ringEl = document.getElementById('ring-progress');
ringEl.style.strokeDasharray  = RING_C;
ringEl.style.strokeDashoffset = RING_C;
function setRingProgress(pct) {
  const p = Math.max(0, Math.min(1, pct));
  ringEl.style.strokeDashoffset = RING_C - RING_C * p;
  ringEl.classList.toggle('danger', p > RING_DANGER_THRESH);
}

function fmt(sec) {
  if (!Number.isFinite(sec) || sec < 0) sec = 0;
  return String(Math.floor(sec/60)).padStart(2,'0') + ':' +
         String(Math.floor(sec%60)).padStart(2,'0');
}
function fmtMs(ms) { return fmt(ms/1000); }
function htmlEscape(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}
function clampInt(value, min, max, fallback) {
  const num = Number(value);
  if (!Number.isFinite(num)) return fallback;
  return Math.min(max, Math.max(min, Math.round(num)));
}
function normalizeMilestone(item, idx) {
  const fallback = MS_DEFAULTS[Math.min(idx, MS_DEFAULTS.length - 1)] || MS_DEFAULTS[0];
  const name = String(item?.name || fallback.name).trim().slice(0, 20) || fallback.name;
  const icon = String(item?.icon || fallback.icon).trim().slice(0, 4) || fallback.icon;
  const emoji = String(item?.emoji || icon || fallback.emoji).trim().slice(0, 4) || fallback.emoji;
  const durationSec = clampInt(item?.durationSec, 10, 60 * 60, fallback.durationSec);
  return {
    name,
    icon,
    durationSec,
    reached: false,
    emoji,
    alertMsg: String(item?.alertMsg || `${name} 시간이 되었습니다.`).slice(0, 120),
    actionLabel: String(item?.actionLabel || `${name} 완료`).slice(0, 40),
  };
}
function setTargetTemp(value) {
  const input = document.getElementById('target-temp');
  input.value = clampInt(value, 100, 300, DEFAULT_TARGET_TEMP);
}
function getTargetTemp() {
  return clampInt(document.getElementById('target-temp').value, 100, 300, DEFAULT_TARGET_TEMP);
}
function saveRecipe() {
  try {
    localStorage.setItem(RECIPE_STORAGE_KEY, JSON.stringify({
      preheatTargetSec: S.preheatTargetSec,
      targetTemp: getTargetTemp(),
      milestones: S.milestones.map(ms => ({
        name: ms.name,
        icon: ms.icon,
        durationSec: ms.durationSec,
        emoji: ms.emoji,
        alertMsg: ms.alertMsg,
        actionLabel: ms.actionLabel,
      })),
    }));
  } catch(e) {}
}
function loadRecipe() {
  try {
    const raw = localStorage.getItem(RECIPE_STORAGE_KEY);
    if (!raw) { setTargetTemp(DEFAULT_TARGET_TEMP); return; }
    const saved = JSON.parse(raw);
    S.preheatTargetSec = clampInt(saved.preheatTargetSec, 30, 60 * 60, S.preheatTargetSec);
    setTargetTemp(saved.targetTemp);
    if (Array.isArray(saved.milestones) && saved.milestones.length) {
      S.milestones = saved.milestones.slice(0, 12).map(normalizeMilestone);
      if (S.milestones.length === 1) S.milestones.push(normalizeMilestone(MS_DEFAULTS[2], 2));
    }
  } catch(e) {
    setTargetTemp(DEFAULT_TARGET_TEMP);
  }
}
function setRoastMode() {
  const active = (S.masterRunning || S.masterElapsed > 0) && !S.masterDone;
  document.getElementById('app').classList.toggle('roast-active', active);
}
function currentAction(es) {
  const idx = S.milestones.findIndex(ms => !ms.reached);
  if (idx < 0) return null;
  const ms = S.milestones[idx];
  const trigger = triggerAt(idx);
  return { idx, ms, trigger, remaining: trigger - es };
}
function setMasterReadout(es) {
  const labelEl = document.getElementById('master-countdown');
  const timeEl = document.getElementById('master-time');

  if (S.masterDone) {
    labelEl.textContent = '로스팅 완료';
    labelEl.className = 'active';
    timeEl.textContent = fmtMs(S.masterElapsed || totalDuration() * 1000);
    timeEl.className = 'done';
    return;
  }

  const active = (S.masterRunning || S.masterElapsed > 0) && !S.masterDone;
  if (active) {
    const action = currentAction(es);
    labelEl.textContent = '다음 행동까지';
    if (!action) {
      labelEl.className = 'active';
      timeEl.textContent = '00:00';
      timeEl.className = '';
      return;
    }

    const rem = action.remaining;
    const danger = rem <= 30 && rem > 0;
    labelEl.className = danger ? 'danger' : 'active';
    timeEl.textContent = (rem < 0 ? '+' : '') + fmt(Math.abs(rem));
    timeEl.className = danger ? 'danger' : 'active';
    return;
  }

  labelEl.textContent = '총 로스팅';
  labelEl.className = '';
  timeEl.textContent = fmt(totalDuration());
  timeEl.className = '';
}
function updateMasterReference() {
  const refEl = document.getElementById('master-reference');
  const added = S.extensionAddedSec;
  refEl.textContent = added > 0
    ? `총 시간 ${fmt(totalDuration())} · +${Math.round(added / 60)}분 추가됨`
    : `총 시간 ${fmt(totalDuration())}`;
  refEl.classList.toggle('extended', added > 0);
}
function focusableIn(root) {
  return [...root.querySelectorAll('button, input, [href], [tabindex]:not([tabindex="-1"])')]
    .filter(el => !el.disabled && el.offsetParent !== null);
}
function openManagedModal(id, focusSelector) {
  const modal = document.getElementById(id);
  if (!S.activeModalId) S.lastFocusedEl = document.activeElement;
  modal.classList.add('active');
  S.activeModalId = id;
  requestAnimationFrame(() => {
    const target = focusSelector ? modal.querySelector(focusSelector) : focusableIn(modal)[0];
    if (target) target.focus({ preventScroll: true });
  });
}
function closeManagedModal(id) {
  const modal = document.getElementById(id);
  modal.classList.remove('active');
  if (S.activeModalId === id) S.activeModalId = null;
  if (!S.activeModalId && S.lastFocusedEl && typeof S.lastFocusedEl.focus === 'function') {
    S.lastFocusedEl.focus({ preventScroll: true });
    S.lastFocusedEl = null;
  }
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep() {
  try {
    const ctx = getACtx();
    [[880,0,.15],[1320,.2,.15],[880,.4,.15],[1320,.6,.3]].forEach(([f,s,d]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'square';
      g.gain.setValueAtTime(.22, ctx.currentTime+s);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+s+d);
      o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d+.05);
    });
  } catch(e) {}
}
function startAlarm() { stopAlarm(); playBeep(); S.alertInterval = setInterval(playBeep, ALARM_INTERVAL_MS); }
function stopAlarm()  { clearInterval(S.alertInterval); S.alertInterval = null; }
function vibe()       { if (navigator.vibrate) navigator.vibrate([500,300,500,300,500]); }

// ─── Wake Lock ────────────────────────────────────────────────────────────────
const wlDot  = document.getElementById('wakelock-dot');
const wlText = document.getElementById('wakelock-text');
function setWLStatus(st) {
  wlDot.className = st === 'on' ? 'on' : '';
  wlText.textContent = st==='on' ? '화면 유지 중' : st==='na' ? '화면 유지 미지원' : '화면 유지';
}
setWLStatus(S.wakeLockSupported ? '' : 'na');
async function requestWakeLock() {
  if (!S.wakeLockSupported) return;
  try {
    S.wakeLock = await navigator.wakeLock.request('screen');
    setWLStatus('on');
    S.wakeLock.addEventListener('release', () => { S.wakeLock = null; setWLStatus(''); });
  } catch(e) {}
}
async function releaseWakeLock() {
  if (S.wakeLock) { await S.wakeLock.release(); S.wakeLock = null; }
}

// ─── Alert ────────────────────────────────────────────────────────────────────
function enqueueAlert(ms) {
  S.alertQueue.push(ms);
  if (!S.alertActive) _showNextAlert();
}
function _showNextAlert() {
  if (!S.alertQueue.length) return;
  const ms = S.alertQueue.shift();
  S.alertActive = true;
  const queueSize = S.alertQueue.length + 1;
  document.getElementById('alert-emoji').textContent = ms.emoji;
  document.getElementById('alert-title').textContent = queueSize > 1
    ? `🚨 ${ms.name} 알람 · 1/${queueSize}`
    : `🚨 ${ms.name} 알람`;
  document.getElementById('alert-msg').textContent   = ms.alertMsg;
  document.getElementById('alert-dismiss').textContent = ms.actionLabel || `${ms.name} 확인`;
  openManagedModal('alert-modal', '#alert-dismiss');
  document.getElementById('flash-overlay').classList.add('flashing');
  startAlarm(); vibe();
}
function dismissAlert() {
  S.alertActive = false;
  closeManagedModal('alert-modal');
  stopAlarm();
  if (navigator.vibrate) navigator.vibrate(0);
  if (S.alertQueue.length) _showNextAlert();
  else if (S.extPending) showExtModal();
  else document.getElementById('flash-overlay').classList.remove('flashing');
}
function clearAllAlerts() {
  S.alertQueue = []; S.alertActive = false; S.extPending = false;
  closeManagedModal('alert-modal');
  document.getElementById('flash-overlay').classList.remove('flashing');
  stopAlarm();
  if (navigator.vibrate) navigator.vibrate(0);
}

// ─── Extension Modal ──────────────────────────────────────────────────────────
function showExtModal() {
  S.extPending = false;
  S.extActive = true;
  openManagedModal('ext-modal', '.ext-btn');
  document.getElementById('flash-overlay').classList.add('flashing');
  startAlarm(); vibe();
}
function queueExtModal() {
  if (S.alertActive || S.alertQueue.length) { S.extPending = true; return; }
  showExtModal();
}
function _closeExtModal() {
  S.extActive = false;
  closeManagedModal('ext-modal');
  document.getElementById('flash-overlay').classList.remove('flashing');
  stopAlarm();
}
function extendRoast(mins) {
  const elapsedMs = S.masterRunning ? Date.now() - S.masterStartTs : S.masterElapsed;
  S.masterElapsed = elapsedMs;
  const addSec = mins * 60;
  const neededSec = elapsedMs / 1000 + addSec - totalDuration();
  lastMs().durationSec += Math.max(addSec, neededSec);
  S.extensionAddedSec += addSec;
  lastMs().reached = false;
  saveRecipe();
  _closeExtModal();
  syncRingAndCountdown();
  renderMilestones();
}
function finishRoast() {
  _closeExtModal(); stopMaster();
  S.masterDone = true;
  setMasterReadout(S.masterElapsed / 1000);
  document.getElementById('master-status').textContent = '🌬️ 쿨링 중';
  const btn = document.getElementById('start-btn');
  btn.textContent = '↻ 같은 리스트로 다시 시작';
  btn.className = 'start-btn restart';
  btn.style.cursor = '';
  setRoastMode();
}

// ─── Confirm ──────────────────────────────────────────────────────────────────
function askReset()    { openManagedModal('confirm-overlay', '.confirm-cancel'); }
function closeConfirm(){ closeManagedModal('confirm-overlay'); }
function doReset() {
  closeConfirm();
  S.masterRunning = false;
  if (!isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
  releaseWakeLock();
  clearAllAlerts();
  if (S.extActive) _closeExtModal();

  S.masterElapsed = 0; S.masterStartTs = null; S.masterDone = false;
  S.extensionAddedSec = 0;
  S.milestones = MS_DEFAULTS.map(d => ({ ...d, reached: false }));
  S.preheatTargetSec = 600;
  setTargetTemp(DEFAULT_TARGET_TEMP);
  saveRecipe();
  setRoastMode();

  document.getElementById('master-status').textContent = '대기 중';
  document.getElementById('master-status').className = '';
  const btn = document.getElementById('start-btn');
  btn.textContent = '☕ 로스팅 시작';
  btn.className = 'start-btn'; btn.style.cursor = '';
  setRingProgress(0);
  renderMilestones();
  syncRingAndCountdown();
}

// ─── Master Status ────────────────────────────────────────────────────────────
function updateMasterStatus(es) {
  if (S.masterDone) return;
  const el     = document.getElementById('master-status');
  const active = S.milestones.find(ms => !ms.reached);
  if (!active) { el.textContent = '완료'; el.className = 'done-ms'; return; }

  const activeIdx = S.milestones.indexOf(active);
  const trigger   = triggerAt(activeIdx);
  const remSec    = trigger - es;

  el.textContent = `${active.icon} ${active.name}`;
  el.className = remSec <= 30 && remSec > 0 ? 'active-ms danger-ms' : 'active-ms';
}

// ─── Ring + Countdown sync ────────────────────────────────────────────────────
function syncRingAndCountdown() {
  const es        = S.masterElapsed / 1000;
  const total     = totalDuration();
  setRingProgress(total > 0 ? es / total : 0);
  setMasterReadout(es);
  updateMasterReference();
  updateMilestoneProgress(es);
}

// ─── RAF 루프 ─────────────────────────────────────────────────────────────────
function isAnyTimerRunning() { return S.masterRunning || S.preheatRunning; }
function ensureLoopRunning() { if (!S.rafId) unifiedLoop(); }

function unifiedLoop() {
  if (!isAnyTimerRunning()) { S.rafId = null; return; }
  S.rafId = requestAnimationFrame(unifiedLoop);
  const now = Date.now();

  if (S.masterRunning) {
    S.masterElapsed = now - S.masterStartTs;
    const es    = S.masterElapsed / 1000;
    const total = totalDuration();

    setMasterReadout(es);
    setRingProgress(total > 0 ? es / total : 0);
    updateMasterReference();
    updateMasterStatus(es);

    // 마일스톤 알람 체크 — triggerAt(i) 기준
    for (let i = 0; i < S.milestones.length; i++) {
      const ms = S.milestones[i];
      if (!ms.reached && es >= triggerAt(i)) {
        ms.reached = true;
        if (i === lastMsIdx()) { if (!S.extActive) queueExtModal(); }
        else                   { enqueueAlert(ms); }
        renderMilestones();
      }
    }
    updateMilestoneProgress(es);
  }

  if (S.preheatRunning) updatePreheatUI(now);
}

// ─── Master ───────────────────────────────────────────────────────────────────
function toggleMaster() {
  if (S.masterDone) { restartRoast(); return; }
  S.masterRunning ? stopMaster() : startMaster();
}
function restartRoast() {
  if (S.extActive) _closeExtModal();
  clearAllAlerts();
  S.masterRunning = false;
  if (!isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
  releaseWakeLock();

  S.masterElapsed = 0; S.masterStartTs = null; S.masterDone = false;
  S.extensionAddedSec = 0;
  S.milestones = S.milestones.map(ms => ({ ...ms, reached: false }));
  setRingProgress(0);
  setRoastMode();
  renderMilestones();
  syncRingAndCountdown();
  startMaster();
}
function startMaster() {
  try { getACtx().resume(); } catch(e) {}
  S.masterRunning = true;
  S.masterStartTs = Date.now() - S.masterElapsed;
  setRoastMode();
  syncRingAndCountdown();
  const btn = document.getElementById('start-btn');
  btn.textContent = '⏸ 일시 정지'; btn.className = 'start-btn running';
  document.getElementById('master-status').textContent = '';
  document.getElementById('master-status').className = '';
  requestWakeLock(); ensureLoopRunning();
}
function stopMaster() {
  S.masterElapsed = Date.now() - S.masterStartTs;
  S.masterRunning = false;
  setRoastMode();
  syncRingAndCountdown();
  if (!isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
  releaseWakeLock();
  if (!S.masterDone) {
    const btn = document.getElementById('start-btn');
    btn.textContent = '▶ 재개'; btn.className = 'start-btn';
    document.getElementById('master-status').textContent = '일시정지';
    document.getElementById('master-status').className = '';
  }
}

// ─── Milestone Progress ───────────────────────────────────────────────────────
function updateMilestoneProgress(es) {
  S.milestones.forEach((ms, i) => {
    const trigger = triggerAt(i);
    const start   = trigger - ms.durationSec;
    const segEl   = es - start;
    const pct     = Math.min(100, Math.max(0, (segEl / ms.durationSec) * 100));

    const bar = document.getElementById(`ms-bar-${i}`);
    if (bar) bar.style.transform = `scaleX(${pct / 100})`;

    const tel = document.getElementById(`ms-time-${i}`);
    if (tel) {
      if (ms.reached) {
        tel.textContent = '✓ ' + fmt(ms.durationSec);
        tel.classList.remove('urgent');
      } else if (S.masterElapsed > 0 && es >= start) {
        const rem = trigger - es;
        tel.textContent = (rem < 0 ? '+' : '') + fmt(Math.abs(rem));
        // 30초 이하면 빨간색으로 변경
        tel.classList.toggle('urgent', rem <= 30 && rem > 0);
      } else {
        tel.textContent = fmt(ms.durationSec);
        tel.classList.remove('urgent');
      }
    }

    const lbl = document.getElementById(`ms-label-${i}`);
    if (lbl) lbl.textContent = fmt(ms.durationSec);
  });
}

// ─── Preheat ──────────────────────────────────────────────────────────────────
function togglePreheat() {
  const btn = document.getElementById('ph-start');
  if (S.preheatRunning) {
    S.preheatElapsedMs = Date.now() - S.preheatStartTs;
    S.preheatRunning = false;
    if (!isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
    btn.textContent = '재개'; btn.classList.remove('active');
  } else {
    try { getACtx().resume(); } catch(e) {}
    S.preheatRunning = true;
    S.preheatStartTs = Date.now() - S.preheatElapsedMs;
    btn.textContent = '정지'; btn.classList.add('active');
    ensureLoopRunning();
  }
}
function updatePreheatUI(now) {
  const elapsed   = (now - S.preheatStartTs) / 1000;
  const remaining = Math.max(0, S.preheatTargetSec - elapsed);
  const pct       = Math.min(100, (elapsed / S.preheatTargetSec) * 100);
  const done      = elapsed >= S.preheatTargetSec;
  const dispEl = document.getElementById('preheat-display');
  dispEl.textContent = fmt(remaining);
  dispEl.className   = 'ph-time-big' + (done ? ' done' : ' running');
  const bar = document.getElementById('ph-bar');
  bar.style.transform = `scaleX(${pct / 100})`;
  bar.classList.toggle('reached', done);
  if (!S.preheatAlarm.reached && done) {
    S.preheatAlarm.reached = true;
    enqueueAlert(S.preheatAlarm);
    S.preheatElapsedMs = Date.now() - S.preheatStartTs;
    S.preheatRunning = false;
    if (!isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
    const btn = document.getElementById('ph-start');
    btn.textContent = '재개'; btn.classList.remove('active');
  }
}
function resetPreheat() {
  const wasRunning = S.preheatRunning;
  S.preheatRunning = false; S.preheatElapsedMs = 0; S.preheatAlarm.reached = false;
  if (wasRunning && !isAnyTimerRunning()) { cancelAnimationFrame(S.rafId); S.rafId = null; }
  const d = document.getElementById('preheat-display');
  d.textContent = fmt(S.preheatTargetSec); d.className = 'ph-time-big';
  document.getElementById('ph-bar').style.transform = 'scaleX(0)';
  document.getElementById('ph-bar').classList.remove('reached');
  const btn = document.getElementById('ph-start');
  btn.textContent = '시작'; btn.classList.remove('active');
}
function adjustPreheat(delta) {
  const nv = S.preheatTargetSec + delta;
  if (nv < 30) return;
  S.preheatTargetSec = nv;
  saveRecipe();
  if (S.preheatRunning) {
    const elapsed = (Date.now() - S.preheatStartTs) / 1000;
    if (elapsed < nv) S.preheatAlarm.reached = false;
    updatePreheatUI(Date.now());
  } else {
    const elapsed   = S.preheatElapsedMs / 1000;
    const remaining = Math.max(0, nv - elapsed);
    document.getElementById('preheat-display').textContent = fmt(remaining);
    if (elapsed < nv) S.preheatAlarm.reached = false;
  }
}

// ─── Milestones ───────────────────────────────────────────────────────────────
function startRename(idx, spanEl) {
  if (S.milestones[idx].reached) return;
  const input = document.createElement('input');
  input.className = 'ms-name-input';
  input.value     = S.milestones[idx].name;
  input.maxLength = 20;
  let committed = false;
  function commit() {
    if (committed) return; committed = true;
    const val = input.value.trim();
    if (val) {
      S.milestones[idx].name = val;
      S.milestones[idx].alertMsg = `${val} 시간이 되었습니다.`;
      S.milestones[idx].actionLabel = `${val} 완료`;
      saveRecipe();
    }
    const span = document.createElement('span');
    span.className = 'ms-name'; span.title = '탭해서 이름 변경';
    span.textContent = S.milestones[idx].name;
    span.onclick = () => startRename(idx, span);
    input.replaceWith(span);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = S.milestones[idx].name; input.blur(); }
  });
  spanEl.replaceWith(input); input.focus(); input.select();
}

function adjustMilestone(idx, delta) {
  const ms = S.milestones[idx];
  if (ms.reached) return;
  const nv = ms.durationSec + delta;
  if (nv < 10) return;
  ms.durationSec = nv;
  // 각 타이머는 독립 — 전체 시간은 합산으로 자동 반영
  saveRecipe();
  renderMilestones();
  syncRingAndCountdown();
}

function renderMilestones() {
  const es    = S.masterElapsed / 1000;
  const count = S.milestones.length;

  document.getElementById('milestones-section').innerHTML =
    S.milestones.map((ms, i) => {
      const trigger = triggerAt(i);
      const start   = trigger - ms.durationSec;
      const isLast  = i === lastMsIdx();
      const canDelete = count > 1 && !isLast && !ms.reached;
      const dis     = ms.reached ? 'disabled' : '';
      const safeIcon = htmlEscape(ms.icon);
      const safeName = htmlEscape(ms.name);

      // 시간 표시: 진행 중이면 남은 구간 시간, 아니면 구간 시간 자체
      let timeStr;
      if (ms.reached) {
        timeStr = '✓ ' + fmt(ms.durationSec);
      } else if (S.masterElapsed > 0 && es >= start) {
        const rem = trigger - es;
        timeStr = (rem < 0 ? '+' : '') + fmt(Math.abs(rem));
      } else {
        timeStr = fmt(ms.durationSec);
      }

      const isActive = !ms.reached && es >= start &&
                       (i === 0 || S.milestones[i-1].reached);

      return `<div class="milestone-card ${ms.reached?'reached':''} ${isActive?'active-ms':''}">
        <div class="ms-header">
          <span class="ms-icon">${safeIcon}</span>
          <div class="ms-info">
            <div class="ms-name-row">
              <span class="ms-name ${ms.reached?'readonly':''}"
                    onclick="${ms.reached ? '' : `startRename(${i},this)`}"
                    title="${ms.reached ? '' : '탭해서 이름 변경'}">${safeName}</span>
              <span class="next-action-label">다음 행동</span>
              <span class="reached-badge">완료</span>
            </div>
            <div class="ms-time-display" id="ms-time-${i}">${timeStr}</div>
          </div>
          <div class="ms-target-label" id="ms-label-${i}">${fmt(ms.durationSec)}</div>
          ${canDelete ? `<button class="ms-delete-btn" onclick="deleteMilestone(${i})" title="삭제" aria-label="${safeName} 삭제">×</button>` : ''}
        </div>
        <div class="ms-progress-wrap">
          <div class="ms-progress-bar" id="ms-bar-${i}"></div>
        </div>
        <div class="adj-grid-6">
          <button class="adj-btn minus" onclick="adjustMilestone(${i},-60)" ${dis}>−1분</button>
          <button class="adj-btn minus" onclick="adjustMilestone(${i},-30)" ${dis}>−30초</button>
          <button class="adj-btn minus" onclick="adjustMilestone(${i},-10)" ${dis}>−10초</button>
          <button class="adj-btn plus"  onclick="adjustMilestone(${i}, 10)" ${dis}>+10초</button>
          <button class="adj-btn plus"  onclick="adjustMilestone(${i}, 30)" ${dis}>+30초</button>
          <button class="adj-btn plus"  onclick="adjustMilestone(${i}, 60)" ${dis}>+1분</button>
        </div>
      </div>`;
    }).join('');
}

function addMilestone() {
  const newDur  = 120; // 새 타이머 기본 2분
  const newName = `알람 ${S.milestones.length}`;
  // 마지막(로스팅 완료) 앞에 삽입만 — 마지막은 건드리지 않음
  // 전체 시간은 newDur(2분)만큼만 늘어남
  S.milestones.splice(lastMsIdx(), 0, {
    name: newName, icon: '⏰', durationSec: newDur,
    reached: false, emoji: '⏰',
    alertMsg: `${newName} 시간이 되었습니다.`,
    actionLabel: `${newName} 완료`,
  });
  saveRecipe();
  renderMilestones();
  syncRingAndCountdown();
}

function deleteMilestone(idx) {
  const ms = S.milestones[idx];
  if (!ms || S.milestones.length <= 1 || idx === lastMsIdx() || ms.reached) return;
  S.alertQueue = S.alertQueue.filter(a => a !== S.milestones[idx]);
  S.milestones.splice(idx, 1);
  saveRecipe();
  renderMilestones();
  syncRingAndCountdown();
}

// ─── DEV ──────────────────────────────────────────────────────────────────────
function toggleDev() {
  S.devMode = !S.devMode;
  document.getElementById('dev-btn').classList.toggle('on', S.devMode);
  document.getElementById('dev-btn').textContent = S.devMode ? '🔧 DEV' : 'DEV';
  if (S.devMode) { document.getElementById('dev-panel').classList.add('open'); renderDevPanel(); }
  else           { document.getElementById('dev-panel').classList.remove('open'); }
}
function renderDevPanel() {
  const items = [
    { label:'🔥 예열 완료 알람', fn: () => enqueueAlert(S.preheatAlarm) },
    ...S.milestones.slice(0,-1).map(ms => ({
      label: `${ms.icon} ${ms.name} 알람`,
      fn: () => enqueueAlert(ms),
    })),
    { label:'✅ 로스팅 완료 (연장 팝업)', fn: () => queueExtModal() },
  ];
  document.getElementById('dev-grid').innerHTML =
    items.map((it,i) => `<div class="dev-row">
      <span class="dev-row-label">${htmlEscape(it.label)}</span>
      <button class="dev-trigger" data-dev="${i}">▶ 미리보기</button>
    </div>`).join('');
  document.getElementById('dev-grid').onclick = e => {
    const btn = e.target.closest('[data-dev]');
    if (!btn) return;
    try { getACtx().resume(); } catch(e2) {}
    items[+btn.dataset.dev].fn();
  };
}

document.addEventListener('keydown', e => {
  if (!S.activeModalId) return;
  const modal = document.getElementById(S.activeModalId);
  if (!modal) return;

  if (e.key === 'Escape' && S.activeModalId === 'confirm-overlay') {
    e.preventDefault();
    closeConfirm();
    return;
  }

  if (e.key !== 'Tab') return;
  const items = focusableIn(modal);
  if (!items.length) return;
  const first = items[0];
  const last = items[items.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault();
    last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault();
    first.focus();
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadRecipe();
document.getElementById('preheat-display').textContent = fmt(S.preheatTargetSec);
document.getElementById('target-temp').addEventListener('change', () => {
  setTargetTemp(getTargetTemp());
  saveRecipe();
});
renderMilestones();
syncRingAndCountdown();
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && S.masterRunning) await requestWakeLock();
});
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
